<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>跑酷闯关 - 跳跳游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; user-select:none; }
canvas { display:block; border-radius:8px; }
#topBar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:8px 12px; z-index:5; }
#topBar button { padding:6px 14px; font-size:13px; border:none; border-radius:8px; background:#555; color:#fff; cursor:pointer; }
#topBar .info { color:#fff; font-size:14px; }
#overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; z-index:10; }
#overlay h1 { font-size:32px; margin-bottom:8px; }
#overlay .sub { font-size:15px; color:#aaa; margin-bottom:16px; }
#overlay .score-display { font-size:24px; color:#ffd700; margin-bottom:8px; }
#overlay button { padding:12px 36px; font-size:18px; border:none; border-radius:10px; background:#e94560; color:#fff; cursor:pointer; margin:4px; transition:transform 0.1s; }
#overlay button:hover { transform:scale(1.05); }
#overlay .secondary { background:#555; font-size:14px; padding:8px 24px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="topBar">
  <button id="backBtn">← 返回</button>
  <div class="info" id="scoreDisplay">0 米</div>
  <button id="pauseBtn">⏸</button>
</div>
<div id="overlay">
  <h1>🏃 跑酷闯关</h1>
  <div class="sub">点击/空格跳跃，下滑躲避</div>
  <div class="score-display" id="highScoreText"></div>
  <button id="startBtn">开始游戏</button>
  <button class="secondary" id="overlayBackBtn">← 返回首页</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlayEl = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');

const GW = 600, GH = 300;
canvas.width = GW; canvas.height = GH;
const GROUND_Y = GH - 50;
const GRAVITY = 0.6;
const JUMP_VEL = -12;

const SCENES = [
  { name:'城市黎明', bg:'#2a2040', ground:'#3a3050', accent:'#e8a060', dist:0 },
  { name:'城市白天', bg:'#3a4a6a', ground:'#4a5a7a', accent:'#88bbdd', dist:500 },
  { name:'城市黄昏', bg:'#5a3a3a', ground:'#6a4a4a', accent:'#e8a060', dist:1500 },
  { name:'城市夜晚', bg:'#1a1a2e', ground:'#2a2a3e', accent:'#6a6aaa', dist:3000 },
  { name:'霓虹都市', bg:'#1a0a2e', ground:'#2a1a3e', accent:'#e94560', dist:5000 },
  { name:'极限模式', bg:'#2a0a0a', ground:'#3a1a1a', accent:'#ff4444', dist:8000 },
];

let player, obstacles, coins, distance, speed, baseSpeed, gameRunning, paused, gameOver;
let particles, floatingTexts, flashAlpha, shakeDur, shakeX, shakeY;
let combo, comboTimer, lastTime, sceneIdx, groundOffset;
let dustTimer, speedLines;
let nearMissTimer;

const HS_KEY = 'runner_highScore';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function setHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }

function init() {
  player = { x: 80, y: GROUND_Y, vy: 0, w: 24, h: 36, state: 'run', slideTimer: 0, squash: 1, stretch: 1 };
  obstacles = []; coins = [];
  distance = 0; baseSpeed = 4; speed = baseSpeed;
  gameRunning = true; paused = false; gameOver = false;
  particles = []; floatingTexts = []; speedLines = [];
  flashAlpha = 0; shakeDur = 0; shakeX = 0; shakeY = 0;
  combo = 0; comboTimer = 0; sceneIdx = 0; groundOffset = 0;
  dustTimer = 0; nearMissTimer = 0;
  lastTime = performance.now();
  overlayEl.style.display = 'none';
  requestAnimationFrame(gameLoop);
}

function getScene() { return SCENES[sceneIdx]; }

function getSpeedMult() {
  if (distance < 500) return 1;
  if (distance < 1500) return 1.2;
  if (distance < 3000) return 1.4;
  if (distance < 5000) return 1.6;
  if (distance < 8000) return 1.8;
  return 2.0;
}

function getObstacleDensity() {
  if (distance < 500) return 0.008;
  if (distance < 1500) return 0.012;
  if (distance < 3000) return 0.016;
  if (distance < 5000) return 0.02;
  return 0.025;
}

function spawnObstacle() {
  const types = ['low'];
  if (distance > 500) types.push('high', 'pit');
  if (distance > 1500) types.push('bird');
  const type = types[Math.floor(Math.random() * types.length)];
  const x = GW + 20;
  if (type === 'low') obstacles.push({ x, y: GROUND_Y, w: 20 + Math.random() * 15, h: 25 + Math.random() * 15, type });
  else if (type === 'high') obstacles.push({ x, y: GROUND_Y - 30, w: 30, h: 20, type });
  else if (type === 'pit') obstacles.push({ x, y: GROUND_Y + 5, w: 40, h: 50, type });
  else if (type === 'bird') obstacles.push({ x, y: GROUND_Y - 50 - Math.random() * 30, w: 25, h: 18, type, wingPhase: 0 });
}

function spawnCoin() {
  const y = GROUND_Y - 30 - Math.random() * 60;
  coins.push({ x: GW + 10, y, collected: false });
}

// Effects
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6-2, life: 1, decay: 0.02+Math.random()*0.03, size: 2+Math.random()*3, color });
}
function addFloating(x, y, text, color) { floatingTexts.push({ x, y, text, color: color||'#ffd700', life: 1, vy: -1.5 }); }
function screenShake(d) { shakeDur = d||150; }
function flashScreen() { flashAlpha = 0.25; }

function jump() {
  if (player.state === 'run' || player.state === 'slide') {
    player.vy = JUMP_VEL;
    player.state = 'jump';
    player.squash = 1.3; player.stretch = 0.7;
    spawnParticles(player.x, GROUND_Y, '#aaa', 5);
  }
}
function slide() {
  if (player.state === 'run') {
    player.state = 'slide'; player.slideTimer = 500;
    player.squash = 0.6; player.stretch = 1.4;
  }
}

function checkCollision(p, o) {
  const ph = p.state === 'slide' ? p.h * 0.4 : p.h;
  const py = p.state === 'slide' ? p.y - ph : p.y - ph;
  if (o.type === 'pit') return p.x + p.w/2 > o.x && p.x - p.w/2 < o.x + o.w && p.y >= GROUND_Y;
  if (o.type === 'high') return p.x + p.w/2 > o.x && p.x - p.w/2 < o.x + o.w && py < o.y + o.h && p.y > o.y;
  return p.x + p.w/2 > o.x && p.x - p.w/2 < o.x + o.w && py < o.y && p.y > o.y - o.h;
}

function checkNearMiss(o) {
  const margin = 8;
  const px = player.x, py = player.y;
  if (o.type === 'low') return px + player.w/2 + margin > o.x && px - player.w/2 - margin < o.x + o.w && py - player.h < o.y && py > o.y - o.h - margin;
  if (o.type === 'bird') return Math.abs(px - o.x) < 30 && Math.abs((py - player.h/2) - o.y) < 30;
  return false;
}

function die() {
  gameOver = true; gameRunning = false;
  setHS(Math.floor(distance));
  screenShake(300);
  spawnParticles(player.x, player.y - player.h/2, '#e94560', 30);
  setTimeout(showGameOver, 600);
}

function showGameOver() {
  const d = Math.floor(distance);
  overlayEl.innerHTML = `<h1>💀 游戏结束</h1><div class="score-display">${d} 米</div><div class="sub">最高分: ${getHS()} 米</div><button id="retryBtn">再来一局</button><button class="secondary" id="goBackBtn">← 返回首页</button>`;
  overlayEl.style.display = 'flex';
  document.getElementById('retryBtn').addEventListener('click', init);
  document.getElementById('goBackBtn').addEventListener('click', goBack);
}

function goBack() { const base = window.location.pathname.replace(/\/games\/[^/]*$/, '/'); window.location.href = base; }

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = ts - lastTime; lastTime = ts;
  if (dt > 100) dt = 100;

  if (gameRunning && !paused) {
    speed = baseSpeed * getSpeedMult();

    // Scene check
    for (let i = SCENES.length - 1; i >= 0; i--) {
      if (distance >= SCENES[i].dist) {
        if (i > sceneIdx) {
          sceneIdx = i;
          addFloating(GW/2, GH/2 - 40, '🎉 ' + SCENES[i].name, '#ffd700');
          flashScreen();
        }
        break;
      }
    }

    distance += speed * dt / 16;
    groundOffset = (groundOffset + speed) % 40;

    // Milestone
    const km = Math.floor(distance / 1000);
    const prevKm = Math.floor((distance - speed * dt / 16) / 1000);
    if (km > prevKm && km > 0) {
      addFloating(GW/2, GH/2 - 20, '🏅 ' + km + '000 米!', '#ffd700');
      flashScreen(); screenShake(150);
      spawnParticles(GW/2, GH/2, '#ffd700', 30);
    }

    // Player physics
    if (player.state === 'jump' || player.state === 'fall') {
      player.vy += GRAVITY;
      player.y += player.vy;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y; player.vy = 0; player.state = 'run';
        player.squash = 0.7; player.stretch = 1.2;
        spawnParticles(player.x, GROUND_Y, '#aaa', 3);
      }
    }
    if (player.state === 'slide') {
      player.slideTimer -= dt;
      if (player.slideTimer <= 0) { player.state = 'run'; player.squash = 1; player.stretch = 1; }
    }

    // Squash/stretch lerp
    player.squash += (1 - player.squash) * 0.1;
    player.stretch += (1 - player.stretch) * 0.1;

    // Spawn obstacles
    if (Math.random() < getObstacleDensity() && (obstacles.length === 0 || obstacles[obstacles.length-1].x < GW - 120)) spawnObstacle();
    if (Math.random() < 0.005) spawnCoin();

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].type === 'bird') obstacles[i].wingPhase += 0.1;
      if (obstacles[i].x + (obstacles[i].w||40) < -20) { obstacles.splice(i, 1); continue; }
      if (checkCollision(player, obstacles[i])) { die(); return; }
      // Near miss
      if (!obstacles[i].missed && !checkCollision(player, obstacles[i]) && checkNearMiss(obstacles[i])) {
        obstacles[i].missed = true;
        addFloating(player.x, player.y - player.h - 10, 'Near Miss! +50', '#00ff88');
        distance += 50; combo++; comboTimer = 2000;
        spawnParticles(player.x, player.y - player.h/2, '#00ff88', 10);
      }
    }

    // Update coins
    for (let i = coins.length - 1; i >= 0; i--) {
      coins[i].x -= speed;
      if (coins[i].x < -20) { coins.splice(i, 1); continue; }
      if (!coins[i].collected && Math.abs(player.x - coins[i].x) < 20 && Math.abs((player.y - player.h/2) - coins[i].y) < 20) {
        coins[i].collected = true;
        distance += 20;
        addFloating(coins[i].x, coins[i].y, '+20', '#ffd700');
        spawnParticles(coins[i].x, coins[i].y, '#ffd700', 10);
        coins.splice(i, 1);
      }
    }

    // Dust particles
    dustTimer += dt;
    if (dustTimer > 80 && player.state === 'run') {
      dustTimer = 0;
      particles.push({ x: player.x - 5 + Math.random()*10, y: GROUND_Y, vx: -1-Math.random(), vy: -0.5-Math.random(), life: 0.6, decay: 0.02, size: 2+Math.random()*2, color: '#888' });
    }

    // Speed lines
    if (speed > 5) {
      if (Math.random() < (speed - 5) * 0.05) {
        speedLines.push({ x: GW, y: Math.random() * GH * 0.8, len: 20 + Math.random() * 40, life: 1 });
      }
    }

    // Combo timer
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    scoreDisplay.textContent = Math.floor(distance) + ' 米';
  }

  // Update effects
  if (flashAlpha > 0) flashAlpha -= 0.012;
  if (shakeDur > 0) { shakeDur -= dt; shakeX = (Math.random()-0.5)*5; shakeY = (Math.random()-0.5)*5; } else { shakeX=0; shakeY=0; }
  for (let i = particles.length-1; i >= 0; i--) { const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
  for (let i = floatingTexts.length-1; i >= 0; i--) { const f=floatingTexts[i]; f.y+=f.vy; f.life-=0.012; if(f.life<=0) floatingTexts.splice(i,1); }
  for (let i = speedLines.length-1; i >= 0; i--) { speedLines[i].x -= speed * 2; speedLines[i].life -= 0.03; if(speedLines[i].life<=0||speedLines[i].x<-50) speedLines.splice(i,1); }

  render();
  requestAnimationFrame(gameLoop);
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  const sc = getScene();

  // Sky
  ctx.fillStyle = sc.bg; ctx.fillRect(0, 0, GW, GH);

  // Speed lines
  speedLines.forEach(l => {
    ctx.globalAlpha = l.life * 0.3;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + l.len, l.y); ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Ground
  ctx.fillStyle = sc.ground; ctx.fillRect(0, GROUND_Y, GW, GH - GROUND_Y);
  // Ground line
  ctx.strokeStyle = sc.accent; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(GW, GROUND_Y); ctx.stroke();
  // Ground dashes
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  for (let x = -groundOffset; x < GW; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y + 15); ctx.lineTo(x + 20, GROUND_Y + 15); ctx.stroke();
  }

  // Obstacles
  obstacles.forEach(o => {
    if (o.type === 'low') {
      ctx.fillStyle = '#e94560';
      ctx.fillRect(o.x, o.y - o.h, o.w, o.h);
      ctx.fillStyle = 'rgba(233,69,96,0.3)';
      ctx.fillRect(o.x - 2, o.y - o.h - 2, o.w + 4, o.h + 4);
    } else if (o.type === 'high') {
      ctx.fillStyle = '#fb8500';
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = 'rgba(251,133,0,0.3)';
      ctx.fillRect(o.x - 2, o.y - 2, o.w + 4, o.h + 4);
    } else if (o.type === 'pit') {
      ctx.fillStyle = '#111';
      ctx.fillRect(o.x, o.y, o.w, o.h);
    } else if (o.type === 'bird') {
      ctx.save(); ctx.translate(o.x + o.w/2, o.y + o.h/2);
      const wing = Math.sin(o.wingPhase) * 8;
      ctx.fillStyle = '#8338ec';
      ctx.beginPath(); ctx.ellipse(0, 0, o.w/2, o.h/2, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-12, wing); ctx.lineTo(-2, 0); ctx.fill();
      ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(12, wing); ctx.lineTo(2, 0); ctx.fill();
      ctx.restore();
    }
  });

  // Coins
  coins.forEach(c => {
    if (c.collected) return;
    const pulse = 0.8 + 0.2 * Math.sin(performance.now() * 0.005);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.arc(c.x, c.y, 6 * pulse, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.beginPath(); ctx.arc(c.x, c.y, 9, 0, Math.PI*2); ctx.fill();
  });

  // Player
  const px = player.x, py = player.y;
  const pw = player.w * player.squash, ph = player.h * player.stretch;
  ctx.save();
  ctx.translate(px, py);
  if (player.state === 'slide') {
    ctx.fillStyle = '#00d2ff';
    ctx.fillRect(-pw/2, -ph * 0.4, pw, ph * 0.4);
    // Slide trail
    ctx.fillStyle = 'rgba(0,210,255,0.2)';
    ctx.fillRect(-pw/2 - 15, -ph * 0.3, 15, ph * 0.3);
  } else {
    ctx.fillStyle = '#00d2ff';
    ctx.fillRect(-pw/2, -ph, pw, ph);
    // Head
    ctx.fillStyle = '#00eeff';
    ctx.beginPath(); ctx.arc(0, -ph + 6, 7, 0, Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(3, -ph + 5, 2, 0, Math.PI*2); ctx.fill();
    // Glow
    ctx.fillStyle = 'rgba(0,210,255,0.15)';
    ctx.beginPath(); ctx.arc(0, -ph/2, pw, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Particles
  particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill(); });
  ctx.globalAlpha = 1;

  // Floating texts
  floatingTexts.forEach(f => { ctx.globalAlpha = f.life; ctx.fillStyle = f.color; ctx.font = 'bold 16px Microsoft YaHei'; ctx.textAlign = 'center'; ctx.fillText(f.text, f.x, f.y); });
  ctx.globalAlpha = 1;

  // Flash
  if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0, 0, GW, GH); }

  // Pause
  if (paused) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Microsoft YaHei'; ctx.textAlign = 'center'; ctx.fillText('⏸ 暂停', GW/2, GH/2); }

  ctx.restore();
}

// Resize
function resize() {
  const maxW = window.innerWidth, maxH = window.innerHeight - 50;
  const scale = Math.min(maxW / GW, maxH / GH, 2);
  canvas.style.width = (GW * scale) + 'px';
  canvas.style.height = (GH * scale) + 'px';
}
window.addEventListener('resize', resize); resize();

// Input
document.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'ArrowUp') && gameRunning && !paused) { e.preventDefault(); jump(); }
  if (e.key === 'ArrowDown' && gameRunning && !paused) { e.preventDefault(); slide(); }
  if (e.key === 'Escape' || e.key === 'p') togglePause();
});

let touchY0 = 0;
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchY0 = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!gameRunning || paused) return;
  const dy = e.changedTouches[0].clientY - touchY0;
  if (dy > 40) slide();
  else jump();
}, { passive: false });
canvas.addEventListener('click', e => { if (gameRunning && !paused) jump(); });

function togglePause() { if (!gameRunning || gameOver) return; paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸'; }
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('overlayBackBtn').addEventListener('click', goBack);
document.getElementById('startBtn').addEventListener('click', init);

const hs = getHS();
if (hs > 0) document.getElementById('highScoreText').textContent = '🏆 最高分: ' + hs + ' 米';
ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, GW, GH);
</script>
</body>
</html>
