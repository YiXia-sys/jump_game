<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小蜜蜂 - 跳跳游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; user-select:none; }
canvas { display:block; border-radius:8px; }
#topBar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:8px 12px; z-index:5; }
#topBar button { padding:6px 14px; font-size:13px; border:none; border-radius:8px; background:#555; color:#fff; cursor:pointer; }
#topBar .info { color:#fff; font-size:14px; }
#overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; z-index:10; }
#overlay h1 { font-size:32px; margin-bottom:8px; }
#overlay .sub { font-size:15px; color:#aaa; margin-bottom:16px; }
#overlay .score-display { font-size:24px; color:#ffd700; margin-bottom:8px; }
#overlay button { padding:12px 36px; font-size:18px; border:none; border-radius:10px; background:#e94560; color:#fff; cursor:pointer; margin:4px; transition:transform 0.1s; }
#overlay button:hover { transform:scale(1.05); }
#overlay .secondary { background:#555; font-size:14px; padding:8px 24px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="topBar">
  <button id="backBtn">← 返回</button>
  <div class="info" id="scoreDisplay">分数: 0 | 波次: 1</div>
  <button id="pauseBtn">⏸</button>
</div>
<div id="overlay">
  <h1>🐝 小蜜蜂</h1>
  <div class="sub">左右移动，自动射击</div>
  <div class="score-display" id="highScoreText"></div>
  <button id="startBtn">开始游戏</button>
  <button class="secondary" id="overlayBackBtn">← 返回首页</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlayEl = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');

const GW = 400, GH = 500;
canvas.width = GW; canvas.height = GH;

let player, enemies, playerBullets, enemyBullets, ufo;
let score, wave, gameRunning, paused, gameOver, lives;
let shootTimer, shootInterval, enemyDir, enemySpeed, enemyShootTimer, enemyShootInterval;
let particles, floatingTexts, flashAlpha, shakeDur, shakeX, shakeY;
let combo, comboTimer, waveClearing, waveClearTimer;
let slowMoTimer, lastTime;
let boss, bossActive;
let killStreak, streakTimer;

const HS_KEY = 'invaders_highScore';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function setHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }

function getWaveConfig(w) {
  const rows = Math.min(5, 2 + w);
  const cols = Math.min(10, 5 + w);
  const spd = 0.3 + w * 0.08;
  const shootInt = Math.max(800, 2000 - w * 200);
  const autoShoot = Math.max(250, 500 - w * 25);
  return { rows, cols, speed: spd, shootInterval: shootInt, autoShoot };
}

function init() {
  score = 0; wave = 1; lives = 3; gameRunning = true; paused = false; gameOver = false;
  player = { x: GW / 2, y: GH - 30, w: 28, h: 20 };
  playerBullets = []; enemyBullets = [];
  particles = []; floatingTexts = [];
  flashAlpha = 0; shakeDur = 0; shakeX = 0; shakeY = 0;
  combo = 0; comboTimer = 0;
  killStreak = 0; streakTimer = 0;
  slowMoTimer = 0;
  waveClearing = false; waveClearTimer = 0;
  boss = null; bossActive = false;
  ufo = null;
  spawnWave();
  const cfg = getWaveConfig(wave);
  shootInterval = cfg.autoShoot;
  shootTimer = 0;
  lastTime = performance.now();
  overlayEl.style.display = 'none';
  requestAnimationFrame(gameLoop);
}

function spawnWave() {
  const cfg = getWaveConfig(wave);
  enemies = [];
  enemyDir = 1;
  enemySpeed = cfg.speed;
  enemyShootInterval = cfg.shootInterval;
  enemyShootTimer = 0;
  shootInterval = cfg.autoShoot;

  // Boss wave every 3 waves starting from 6
  if (wave >= 6 && wave % 3 === 0) {
    bossActive = true;
    boss = { x: GW/2, y: 60, w: 60, h: 40, hp: 10 + wave, maxHp: 10 + wave, dir: 1, shootTimer: 0 };
    return;
  }
  bossActive = false; boss = null;

  const startX = (GW - cfg.cols * 36) / 2 + 18;
  const startY = 50;
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const isElite = wave >= 3 && r === 0 && Math.random() < 0.15 * (wave - 2);
      enemies.push({ x: startX + c * 36, y: startY + r * 30, w: 24, h: 20, alive: true, hp: isElite ? 2 : 1, type: isElite ? 'elite' : 'normal', row: r });
    }
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) particles.push({ x, y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-2, life:1, decay:0.02+Math.random()*0.03, size:2+Math.random()*4, color });
}
function addFloating(x, y, text, color) { floatingTexts.push({ x, y, text, color:color||'#ffd700', life:1, vy:-1.5 }); }
function screenShake(d) { shakeDur = d||150; }
function flashScreen() { flashAlpha = 0.3; }

function playerShoot() {
  const size = killStreak >= 5 ? 4 : 3;
  playerBullets.push({ x: player.x, y: player.y - player.h/2, w: size, h: 10, dy: -8 });
}

function enemyShoot() {
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) return;
  // Pick from bottom row
  const maxRow = Math.max(...alive.map(e => e.row));
  const bottom = alive.filter(e => e.row === maxRow);
  const shooter = bottom[Math.floor(Math.random() * bottom.length)];
  enemyBullets.push({ x: shooter.x, y: shooter.y + shooter.h/2, w: 3, h: 8, dy: 4 + wave * 0.3 });
}

function checkWaveComplete() {
  if (bossActive) return boss === null;
  return enemies.every(e => !e.alive);
}

function nextWave() {
  wave++;
  waveClearing = true; waveClearTimer = 2000;
  addFloating(GW/2, GH/2 - 30, '🎉 WAVE ' + (wave-1) + ' CLEAR!', '#ffd700');
  flashScreen(); screenShake(200);
  spawnParticles(GW/2, GH/2, '#ffd700', 40);
  if (wave % 5 === 0 && lives < 5) { lives++; addFloating(GW/2, GH/2 + 10, '+1 ❤️', '#ff6b6b'); }
  enemyBullets = [];
}

function hitPlayer() {
  lives--;
  screenShake(250);
  spawnParticles(player.x, player.y, '#e94560', 25);
  flashScreen();
  if (lives <= 0) die();
}

function die() {
  gameOver = true; gameRunning = false;
  setHS(score);
  setTimeout(showGameOver, 500);
}

function showGameOver() {
  overlayEl.innerHTML = `<h1>💀 游戏结束</h1><div class="score-display">得分: ${score}</div><div class="sub">最高分: ${getHS()} | 波次: ${wave}</div><button id="retryBtn">再来一局</button><button class="secondary" id="goBackBtn">← 返回首页</button>`;
  overlayEl.style.display = 'flex';
  document.getElementById('retryBtn').addEventListener('click', init);
  document.getElementById('goBackBtn').addEventListener('click', goBack);
}

function goBack() { const base = window.location.pathname.replace(/\/games\/[^/]*$/, '/'); window.location.href = base; }

function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = ts - lastTime; lastTime = ts;
  if (dt > 100) dt = 100;
  if (slowMoTimer > 0) { slowMoTimer -= dt; dt *= 0.3; }

  if (gameRunning && !paused) {
    if (waveClearing) {
      waveClearTimer -= dt;
      if (waveClearTimer <= 0) { waveClearing = false; spawnWave(); }
    } else {
      // Auto shoot
      shootTimer += dt;
      if (shootTimer >= shootInterval) { shootTimer -= shootInterval; playerShoot(); }

      // Enemy shoot
      if (!bossActive) {
        enemyShootTimer += dt;
        if (enemyShootTimer >= enemyShootInterval) { enemyShootTimer -= enemyShootInterval; enemyShoot(); }
      }

      // Kill streak timer
      if (streakTimer > 0) { streakTimer -= dt; if (streakTimer <= 0) killStreak = 0; }
      // Combo timer
      if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

      // UFO
      if (!ufo && wave >= 4 && Math.random() < 0.0003) {
        ufo = { x: -30, y: 25, dir: 1, w: 30, h: 14 };
      }
      if (ufo) {
        ufo.x += ufo.dir * 2;
        if (ufo.x > GW + 40) ufo = null;
      }

      // Move enemies
      if (!bossActive) {
        let hitEdge = false;
        const alive = enemies.filter(e => e.alive);
        alive.forEach(e => { e.x += enemyDir * enemySpeed; if (e.x < 15 || e.x > GW - 15) hitEdge = true; });
        if (hitEdge) { enemyDir *= -1; alive.forEach(e => e.y += 12); }
        // Check if enemies reached player
        if (alive.some(e => e.y + e.h/2 > player.y - 20)) die();
      } else if (boss) {
        boss.x += boss.dir * 1.5;
        if (boss.x < 40 || boss.x > GW - 40) boss.dir *= -1;
        boss.shootTimer += dt;
        if (boss.shootTimer > 600) {
          boss.shootTimer = 0;
          enemyBullets.push({ x: boss.x - 15, y: boss.y + boss.h/2, w: 3, h: 8, dy: 5 });
          enemyBullets.push({ x: boss.x + 15, y: boss.y + boss.h/2, w: 3, h: 8, dy: 5 });
          enemyBullets.push({ x: boss.x, y: boss.y + boss.h/2, w: 3, h: 8, dy: 5.5 });
        }
      }

      // Update player bullets
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i]; b.y += b.dy;
        if (b.y < -10) { playerBullets.splice(i, 1); continue; }

        // Hit boss
        if (boss && Math.abs(b.x - boss.x) < boss.w/2 && Math.abs(b.y - boss.y) < boss.h/2) {
          boss.hp--;
          playerBullets.splice(i, 1);
          spawnParticles(b.x, b.y, '#ff6b6b', 10);
          screenShake(80);
          score += 50;
          if (boss.hp <= 0) {
            spawnParticles(boss.x, boss.y, '#ffd700', 50);
            spawnParticles(boss.x, boss.y, '#e94560', 30);
            addFloating(boss.x, boss.y, '+' + (500 * wave), '#ffd700');
            score += 500 * wave;
            flashScreen(); screenShake(300); slowMoTimer = 300;
            boss = null;
            nextWave();
          }
          continue;
        }

        // Hit UFO
        if (ufo && Math.abs(b.x - ufo.x) < ufo.w/2 && Math.abs(b.y - ufo.y) < ufo.h/2) {
          spawnParticles(ufo.x, ufo.y, '#ffd700', 25);
          addFloating(ufo.x, ufo.y, '+500', '#ffd700');
          score += 500; flashScreen();
          ufo = null; playerBullets.splice(i, 1); continue;
        }

        // Hit enemies
        let hit = false;
        for (const e of enemies) {
          if (!e.alive) continue;
          if (Math.abs(b.x - e.x) < e.w/2 && Math.abs(b.y - e.y) < e.h/2) {
            e.hp--;
            if (e.hp <= 0) {
              e.alive = false;
              const pts = (5 - e.row) * 10 + (e.type === 'elite' ? 30 : 0);
              score += pts;
              addFloating(e.x, e.y, '+' + pts, e.type === 'elite' ? '#ff6b6b' : '#06d6a0');
              spawnParticles(e.x, e.y, e.type === 'elite' ? '#ff6b6b' : '#06d6a0', e.type === 'elite' ? 25 : 15);
              killStreak++; streakTimer = 1500;
              combo++; comboTimer = 2000;
              if (combo >= 3) addFloating(GW/2, GH/2, 'x' + combo + ' COMBO!', '#ff6b6b');

              // Check row clear
              const rowEnemies = enemies.filter(en => en.row === e.row);
              if (rowEnemies.every(en => !en.alive)) {
                rowEnemies.forEach(en => spawnParticles(en.x, en.y, '#ffd700', 8));
                addFloating(GW/2, e.y, '整行清除!', '#ffd700');
                score += 100;
              }

              // Last enemy slow-mo
              const aliveCount = enemies.filter(en => en.alive).length;
              if (aliveCount === 0) { slowMoTimer = 200; nextWave(); }
              else if (aliveCount === 1) slowMoTimer = 150;
            } else {
              spawnParticles(e.x, e.y, '#ff6b6b', 5);
            }
            screenShake(60);
            hit = true; break;
          }
        }
        if (hit) playerBullets.splice(i, 1);
      }

      // Update enemy bullets
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i]; b.y += b.dy;
        if (b.y > GH + 10) { enemyBullets.splice(i, 1); continue; }
        if (Math.abs(b.x - player.x) < player.w/2 && Math.abs(b.y - player.y) < player.h/2) {
          enemyBullets.splice(i, 1); hitPlayer();
        }
      }
    }
    scoreDisplay.textContent = '分数: ' + score + ' | 波次: ' + wave;
  }

  // Effects
  if (flashAlpha > 0) flashAlpha -= 0.015;
  if (shakeDur > 0) { shakeDur -= dt; shakeX = (Math.random()-0.5)*5; shakeY = (Math.random()-0.5)*5; } else { shakeX=0; shakeY=0; }
  for (let i = particles.length-1; i >= 0; i--) { const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay; if(p.life<=0) particles.splice(i,1); }
  for (let i = floatingTexts.length-1; i >= 0; i--) { const f=floatingTexts[i]; f.y+=f.vy; f.life-=0.012; if(f.life<=0) floatingTexts.splice(i,1); }

  render();
  requestAnimationFrame(gameLoop);
}

function render() {
  ctx.save(); ctx.translate(shakeX, shakeY);

  // BG
  ctx.fillStyle = '#0a0a1e'; ctx.fillRect(0, 0, GW, GH);
  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137 + performance.now() * 0.01) % GW;
    const sy = (i * 97) % GH;
    ctx.fillStyle = `rgba(255,255,255,${0.2 + 0.3 * Math.sin(performance.now() * 0.002 + i)})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = e.type === 'elite' ? '#ff4444' : '#06d6a0';
    // Simple invader shape
    ctx.fillRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);
    ctx.fillStyle = e.type === 'elite' ? 'rgba(255,68,68,0.3)' : 'rgba(6,214,160,0.2)';
    ctx.fillRect(e.x - e.w/2 - 2, e.y - e.h/2 - 2, e.w + 4, e.h + 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(e.x - 5, e.y - 2, 3, 3);
    ctx.fillRect(e.x + 3, e.y - 2, 3, 3);
    // Legs wiggle
    const wig = Math.sin(performance.now() * 0.005 + e.x) * 2;
    ctx.fillStyle = e.type === 'elite' ? '#ff4444' : '#06d6a0';
    ctx.fillRect(e.x - e.w/2, e.y + e.h/2, 4, 4 + wig);
    ctx.fillRect(e.x + e.w/2 - 4, e.y + e.h/2, 4, 4 - wig);
  });

  // Boss
  if (boss) {
    ctx.fillStyle = '#e94560';
    ctx.fillRect(boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h);
    ctx.fillStyle = 'rgba(233,69,96,0.3)';
    ctx.fillRect(boss.x - boss.w/2 - 3, boss.y - boss.h/2 - 3, boss.w + 6, boss.h + 6);
    // HP bar
    ctx.fillStyle = '#333'; ctx.fillRect(boss.x - 30, boss.y - boss.h/2 - 10, 60, 6);
    ctx.fillStyle = '#e94560'; ctx.fillRect(boss.x - 30, boss.y - boss.h/2 - 10, 60 * (boss.hp / boss.maxHp), 6);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(boss.x - 12, boss.y - 5, 6, 6);
    ctx.fillRect(boss.x + 6, boss.y - 5, 6, 6);
  }

  // UFO
  if (ufo) {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y, ufo.w/2, ufo.h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,215,0,0.3)';
    ctx.beginPath(); ctx.ellipse(ufo.x, ufo.y, ufo.w/2 + 4, ufo.h/2 + 4, 0, 0, Math.PI*2); ctx.fill();
  }

  // Player
  ctx.fillStyle = '#00d2ff';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.h);
  ctx.lineTo(player.x - player.w/2, player.y);
  ctx.lineTo(player.x + player.w/2, player.y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,210,255,0.2)';
  ctx.beginPath(); ctx.arc(player.x, player.y - player.h/2, player.w, 0, Math.PI*2); ctx.fill();
  // Thruster
  const thrLen = 3 + Math.random() * 5;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.moveTo(player.x - 4, player.y); ctx.lineTo(player.x, player.y + thrLen); ctx.lineTo(player.x + 4, player.y); ctx.fill();

  // Player bullets
  playerBullets.forEach(b => {
    const glow = killStreak >= 5;
    ctx.fillStyle = glow ? '#ffd700' : '#00ff88';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
    if (glow) { ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.fillRect(b.x - b.w, b.y - b.h/2, b.w*2, b.h); }
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.fillStyle = '#e94560';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  });

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#e94560'; ctx.font = '14px Microsoft YaHei';
    ctx.fillText('❤️', 10 + i * 20, GH - 10);
  }

  // Particles
  particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2); ctx.fill(); });
  ctx.globalAlpha = 1;

  // Floating texts
  floatingTexts.forEach(f => { ctx.globalAlpha = f.life; ctx.fillStyle = f.color; ctx.font = 'bold 16px Microsoft YaHei'; ctx.textAlign = 'center'; ctx.fillText(f.text, f.x, f.y); });
  ctx.globalAlpha = 1;

  // Flash
  if (flashAlpha > 0) { ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`; ctx.fillRect(0, 0, GW, GH); }

  // Pause
  if (paused) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Microsoft YaHei'; ctx.textAlign = 'center'; ctx.fillText('⏸ 暂停', GW/2, GH/2); }

  ctx.restore();
}

// Resize
function resize() { const s = Math.min(window.innerWidth/GW, (window.innerHeight-50)/GH, 2); canvas.style.width=(GW*s)+'px'; canvas.style.height=(GH*s)+'px'; }
window.addEventListener('resize', resize); resize();

// Input
let moveDir = 0;
const PLAYER_SPEED = 5;
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') moveDir = -1;
  else if (e.key === 'ArrowRight') moveDir = 1;
  else if (e.key === 'Escape' || e.key === 'p') togglePause();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' && moveDir === -1) moveDir = 0;
  if (e.key === 'ArrowRight' && moveDir === 1) moveDir = 0;
});

// Touch - drag to move
let touchActive = false, touchX = 0;
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchActive = true; touchX = e.touches[0].clientX; }, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const rect = canvas.getBoundingClientRect();
  const scale = GW / rect.width;
  player.x = (e.touches[0].clientX - rect.left) * scale;
  player.x = Math.max(player.w/2, Math.min(GW - player.w/2, player.x));
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchActive = false; }, { passive: false });

// Mouse move
canvas.addEventListener('mousemove', e => {
  if (!gameRunning || paused) return;
  const rect = canvas.getBoundingClientRect();
  const scale = GW / rect.width;
  player.x = (e.clientX - rect.left) * scale;
  player.x = Math.max(player.w/2, Math.min(GW - player.w/2, player.x));
});

// Keyboard movement in game loop
setInterval(() => {
  if (!gameRunning || paused) return;
  if (moveDir !== 0) {
    player.x += moveDir * PLAYER_SPEED;
    player.x = Math.max(player.w/2, Math.min(GW - player.w/2, player.x));
  }
}, 16);

function togglePause() { if (!gameRunning || gameOver) return; paused = !paused; document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸'; }
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('overlayBackBtn').addEventListener('click', goBack);
document.getElementById('startBtn').addEventListener('click', init);

const hs = getHS();
if (hs > 0) document.getElementById('highScoreText').textContent = '🏆 最高分: ' + hs;
ctx.fillStyle = '#0a0a1e'; ctx.fillRect(0, 0, GW, GH);
</script>
</body>
</html>
