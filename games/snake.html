<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇 - 跳跳游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; user-select:none; }
canvas { display:block; border-radius:8px; }
#ui { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
#topBar { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; pointer-events:auto; }
#topBar button { padding:6px 14px; font-size:13px; border:none; border-radius:8px; background:#555; color:#fff; cursor:pointer; }
#topBar .info { color:#fff; font-size:14px; }
#overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; pointer-events:auto; }
#overlay h1 { font-size:32px; margin-bottom:8px; }
#overlay .sub { font-size:15px; color:#aaa; margin-bottom:16px; }
#overlay .score-display { font-size:24px; color:#ffd700; margin-bottom:8px; }
#overlay button { padding:12px 36px; font-size:18px; border:none; border-radius:10px; background:#e94560; color:#fff; cursor:pointer; margin:4px; transition:transform 0.1s; }
#overlay button:hover { transform:scale(1.05); }
#overlay button:active { transform:scale(0.95); }
#overlay .secondary { background:#555; font-size:14px; padding:8px 24px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="topBar">
    <button id="backBtn">← 返回</button>
    <div class="info" id="scoreDisplay">分数: 0</div>
    <button id="pauseBtn">⏸</button>
  </div>
</div>
<div id="overlay">
  <h1>🐍 贪吃蛇</h1>
  <div class="sub">滑动或方向键控制方向</div>
  <div class="score-display" id="highScoreText"></div>
  <button id="startBtn">开始游戏</button>
  <button class="secondary" id="overlayBackBtn">← 返回首页</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlayEl = document.getElementById('overlay');
const scoreDisplay = document.getElementById('scoreDisplay');
const highScoreText = document.getElementById('highScoreText');

// Game constants
const COLS = 20, ROWS = 20, CELL = 20;
const GW = COLS * CELL, GH = ROWS * CELL;
canvas.width = GW; canvas.height = GH;

// Game state
let snake, direction, nextDirection, food, obstacles;
let score, moveTimer, moveInterval, gameRunning, paused, gameOver;
let combo, comboTimer, frenzyTimer, frenzyFoods;
let particles, floatingTexts, flashAlpha, shakeDur, shakeX, shakeY;
let totalEaten, lastTime;
let slowMoTimer, slowMoFactor;

const HS_KEY = 'snake_highScore';
function getHS() { return parseInt(localStorage.getItem(HS_KEY)) || 0; }
function setHS(s) { if (s > getHS()) localStorage.setItem(HS_KEY, s); }

function init() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
  direction = 'right'; nextDirection = 'right';
  score = 0; totalEaten = 0;
  moveTimer = 0; moveInterval = 200;
  gameRunning = true; paused = false; gameOver = false;
  combo = 0; comboTimer = 0;
  frenzyTimer = 0; frenzyFoods = [];
  particles = []; floatingTexts = [];
  flashAlpha = 0; shakeDur = 0; shakeX = 0; shakeY = 0;
  slowMoTimer = 0; slowMoFactor = 1;
  obstacles = [];
  spawnFood();
  updateScoreDisplay();
  overlayEl.style.display = 'none';
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function spawnFood() {
  const occupied = new Set();
  snake.forEach(s => occupied.add(s.x + ',' + s.y));
  obstacles.forEach(o => occupied.add(o.x + ',' + o.y));
  if (food) occupied.add(food.x + ',' + food.y);
  frenzyFoods.forEach(f => occupied.add(f.x + ',' + f.y));

  let type = 'normal';
  const len = snake.length;
  if (len > 10 && Math.random() < (len > 35 ? 0.3 : 0.15)) type = 'gold';
  if (len > 50 && Math.random() < 0.12) type = 'poison';

  for (let i = 0; i < 200; i++) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    if (!occupied.has(x + ',' + y)) {
      food = { x, y, type, timer: type === 'gold' ? 5000 : 0 };
      return;
    }
  }
  food = { x: 0, y: 0, type: 'normal', timer: 0 };
}

function spawnObstacles() {
  const len = snake.length;
  let maxObs = 0;
  if (len >= 21) maxObs = Math.min(5, Math.floor((len - 21) / 15) + 1);
  while (obstacles.length < maxObs) {
    const occupied = new Set();
    snake.forEach(s => occupied.add(s.x + ',' + s.y));
    obstacles.forEach(o => occupied.add(o.x + ',' + o.y));
    if (food) occupied.add(food.x + ',' + food.y);
    for (let i = 0; i < 100; i++) {
      const x = Math.floor(Math.random() * COLS);
      const y = Math.floor(Math.random() * ROWS);
      if (!occupied.has(x + ',' + y)) { obstacles.push({ x, y }); break; }
    }
  }
}

function getSpeed() {
  const len = snake.length;
  if (len <= 10) return 200;
  if (len <= 20) return 170;
  if (len <= 35) return 140;
  if (len <= 50) return 120;
  if (len <= 70) return 100;
  return 85;
}

// Effects
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x: x * CELL + CELL / 2, y: y * CELL + CELL / 2, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 1, life: 1, decay: 0.02 + Math.random() * 0.03, size: 2 + Math.random() * 3, color });
  }
}
function addFloating(x, y, text, color) {
  floatingTexts.push({ x: x * CELL + CELL / 2, y: y * CELL, text, color: color || '#ffd700', life: 1, vy: -1.5 });
}
function screenShake(dur) { shakeDur = dur || 150; }
function flashScreen() { flashAlpha = 0.3; }
function addCombo() {
  combo++; comboTimer = 2000;
  if (combo >= 3) { addFloating(snake[0].x, snake[0].y - 1, 'x' + combo + ' COMBO!', '#ff6b6b'); screenShake(100); }
}

function updateScoreDisplay() {
  scoreDisplay.textContent = '分数: ' + score;
}

// Movement
function moveSnake() {
  direction = nextDirection;
  const head = snake[0];
  let nx = head.x, ny = head.y;
  if (direction === 'up') ny--;
  else if (direction === 'down') ny++;
  else if (direction === 'left') nx--;
  else if (direction === 'right') nx++;

  // Wall collision
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { die(); return; }
  // Self collision
  for (let i = 0; i < snake.length; i++) { if (snake[i].x === nx && snake[i].y === ny) { die(); return; } }
  // Obstacle collision
  for (const o of obstacles) { if (o.x === nx && o.y === ny) { die(); return; } }

  snake.unshift({ x: nx, y: ny });

  // Check food
  let ate = false;
  if (food && nx === food.x && ny === food.y) {
    ate = true;
    if (food.type === 'normal') { score += 10; addFloating(nx, ny, '+10', '#06d6a0'); spawnParticles(nx, ny, '#06d6a0', 15); }
    else if (food.type === 'gold') { score += 30; addFloating(nx, ny, '+30', '#ffd700'); spawnParticles(nx, ny, '#ffd700', 25); flashScreen(); screenShake(120); }
    else if (food.type === 'poison') {
      score = Math.max(0, score - 10);
      addFloating(nx, ny, '-10', '#a855f7');
      spawnParticles(nx, ny, '#a855f7', 20);
      screenShake(200);
      // Remove 3 tail segments but don't die
      for (let i = 0; i < 3 && snake.length > 2; i++) snake.pop();
    }
    totalEaten++;
    addCombo();
    spawnFood();
    spawnObstacles();
    moveInterval = getSpeed();
    updateScoreDisplay();

    // Frenzy mode every 10 foods
    if (totalEaten > 0 && totalEaten % 10 === 0) {
      frenzyTimer = 3000;
      for (let i = 0; i < 3; i++) {
        const occupied = new Set();
        snake.forEach(s => occupied.add(s.x + ',' + s.y));
        obstacles.forEach(o => occupied.add(o.x + ',' + o.y));
        if (food) occupied.add(food.x + ',' + food.y);
        frenzyFoods.forEach(f => occupied.add(f.x + ',' + f.y));
        for (let j = 0; j < 100; j++) {
          const fx = Math.floor(Math.random() * COLS), fy = Math.floor(Math.random() * ROWS);
          if (!occupied.has(fx + ',' + fy)) { frenzyFoods.push({ x: fx, y: fy }); break; }
        }
      }
      addFloating(Math.floor(COLS / 2), Math.floor(ROWS / 2) - 2, '🔥 狂热模式!', '#ff6b6b');
      flashScreen();
    }

    // Milestones
    const len = snake.length;
    if (len === 20 || len === 50 || len === 100) {
      addFloating(Math.floor(COLS / 2), Math.floor(ROWS / 2), '🎉 长度 ' + len + '!', '#ffd700');
      flashScreen(); screenShake(200);
      spawnParticles(Math.floor(COLS / 2), Math.floor(ROWS / 2), '#ffd700', 40);
    }
  }

  // Check frenzy foods
  for (let i = frenzyFoods.length - 1; i >= 0; i--) {
    if (frenzyFoods[i].x === nx && frenzyFoods[i].y === ny) {
      score += 20; addFloating(nx, ny, '+20', '#ff6b6b'); spawnParticles(nx, ny, '#ff6b6b', 20);
      addCombo(); ate = true; totalEaten++;
      frenzyFoods.splice(i, 1);
      updateScoreDisplay();
    }
  }

  if (!ate) snake.pop();
}

function die() {
  gameOver = true; gameRunning = false;
  setHS(score);
  screenShake(300);
  // Death particles along snake
  snake.forEach((s, i) => { setTimeout(() => spawnParticles(s.x, s.y, '#e94560', 8), i * 30); });
  setTimeout(showGameOver, 800);
}

function showGameOver() {
  const hs = getHS();
  overlayEl.innerHTML = `
    <h1>💀 游戏结束</h1>
    <div class="score-display">得分: ${score}</div>
    <div class="sub">最高分: ${hs} | 长度: ${snake.length}</div>
    <button id="retryBtn">再来一局</button>
    <button class="secondary" id="goBackBtn">← 返回首页</button>
  `;
  overlayEl.style.display = 'flex';
  document.getElementById('retryBtn').addEventListener('click', init);
  document.getElementById('goBackBtn').addEventListener('click', goBack);
}

function goBack() {
  const base = window.location.pathname.replace(/\/games\/[^/]*$/, '/');
  window.location.href = base;
}

// Game loop
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = ts - lastTime;
  lastTime = ts;
  if (dt > 100) dt = 100;

  if (gameRunning && !paused) {
    // Slow motion
    if (slowMoTimer > 0) { slowMoTimer -= dt; dt *= 0.3; }

    // Combo timer
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

    // Frenzy timer
    if (frenzyTimer > 0) { frenzyTimer -= dt; if (frenzyTimer <= 0) frenzyFoods = []; }

    // Gold food timer
    if (food && food.type === 'gold' && food.timer > 0) {
      food.timer -= dt;
      if (food.timer <= 0) { spawnParticles(food.x, food.y, '#ffd700', 10); spawnFood(); }
    }

    // Move
    moveTimer += dt;
    if (moveTimer >= moveInterval) { moveTimer -= moveInterval; moveSnake(); }
  }

  // Update effects
  if (flashAlpha > 0) flashAlpha -= 0.015;
  if (shakeDur > 0) { shakeDur -= dt; shakeX = (Math.random() - 0.5) * 5; shakeY = (Math.random() - 0.5) * 5; } else { shakeX = 0; shakeY = 0; }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const f = floatingTexts[i]; f.y += f.vy; f.life -= 0.015;
    if (f.life <= 0) floatingTexts.splice(i, 1);
  }

  render();
  requestAnimationFrame(gameLoop);
}

function render() {
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  const bgColor = frenzyTimer > 0 ? '#2a1a3e' : '#1a1a2e';
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, GW, GH);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, GH); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(GW, y * CELL); ctx.stroke(); }

  // Obstacles
  obstacles.forEach(o => {
    ctx.fillStyle = '#4a4a6a';
    ctx.fillRect(o.x * CELL + 1, o.y * CELL + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = '#6a6a8a'; ctx.lineWidth = 1;
    ctx.strokeRect(o.x * CELL + 1, o.y * CELL + 1, CELL - 2, CELL - 2);
  });

  // Food
  if (food) {
    const fx = food.x * CELL + CELL / 2, fy = food.y * CELL + CELL / 2;
    if (food.type === 'normal') {
      ctx.fillStyle = '#06d6a0'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(6,214,160,0.3)'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 + 2, 0, Math.PI * 2); ctx.fill();
    } else if (food.type === 'gold') {
      const pulse = 0.8 + 0.2 * Math.sin(performance.now() * 0.005);
      ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(fx, fy, (CELL / 2 - 1) * pulse, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,215,0,0.3)'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 + 3, 0, Math.PI * 2); ctx.fill();
    } else if (food.type === 'poison') {
      ctx.fillStyle = '#a855f7'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 - 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(168,85,247,0.3)'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 + 2, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Frenzy foods
  frenzyFoods.forEach(f => {
    const fx = f.x * CELL + CELL / 2, fy = f.y * CELL + CELL / 2;
    const pulse = 0.8 + 0.2 * Math.sin(performance.now() * 0.008);
    ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(fx, fy, (CELL / 2 - 1) * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,107,107,0.3)'; ctx.beginPath(); ctx.arc(fx, fy, CELL / 2 + 2, 0, Math.PI * 2); ctx.fill();
  });

  // Snake
  snake.forEach((s, i) => {
    const r = i === 0 ? CELL / 2 - 1 : CELL / 2 - 2;
    const alpha = 1 - i * 0.008;
    const hue = (120 + i * 3) % 360;
    ctx.fillStyle = i === 0 ? '#00ff88' : `hsla(${hue},80%,55%,${Math.max(0.4, alpha)})`;
    ctx.beginPath();
    ctx.arc(s.x * CELL + CELL / 2, s.y * CELL + CELL / 2, r, 0, Math.PI * 2);
    ctx.fill();
    // Glow on head
    if (i === 0) {
      ctx.fillStyle = 'rgba(0,255,136,0.25)';
      ctx.beginPath(); ctx.arc(s.x * CELL + CELL / 2, s.y * CELL + CELL / 2, CELL / 2 + 3, 0, Math.PI * 2); ctx.fill();
      // Eyes
      let ex1, ey1, ex2, ey2;
      const cx = s.x * CELL + CELL / 2, cy = s.y * CELL + CELL / 2;
      if (direction === 'right') { ex1 = cx + 3; ey1 = cy - 3; ex2 = cx + 3; ey2 = cy + 3; }
      else if (direction === 'left') { ex1 = cx - 3; ey1 = cy - 3; ex2 = cx - 3; ey2 = cy + 3; }
      else if (direction === 'up') { ex1 = cx - 3; ey1 = cy - 3; ex2 = cx + 3; ey2 = cy - 3; }
      else { ex1 = cx - 3; ey1 = cy + 3; ex2 = cx + 3; ey2 = cy + 3; }
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(ex1, ey1, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI * 2); ctx.fill();
    }
  });

  // Frenzy border glow
  if (frenzyTimer > 0) {
    const a = 0.15 + 0.1 * Math.sin(performance.now() * 0.006);
    ctx.strokeStyle = `rgba(255,107,107,${a})`; ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, GW - 4, GH - 4);
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Floating texts
  floatingTexts.forEach(f => {
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.color;
    ctx.font = 'bold 16px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;

  // Flash
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
    ctx.fillRect(0, 0, GW, GH);
  }

  // Pause overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Microsoft YaHei'; ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', GW / 2, GH / 2);
  }

  ctx.restore();
}

// Resize
function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 50;
  const scale = Math.min(maxW / GW, maxH / GH, 2);
  canvas.style.width = (GW * scale) + 'px';
  canvas.style.height = (GH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// Input - keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp' && direction !== 'down') nextDirection = 'up';
  else if (e.key === 'ArrowDown' && direction !== 'up') nextDirection = 'down';
  else if (e.key === 'ArrowLeft' && direction !== 'right') nextDirection = 'left';
  else if (e.key === 'ArrowRight' && direction !== 'left') nextDirection = 'right';
  else if (e.key === 'Escape' || e.key === 'p') togglePause();
});

// Input - touch swipe
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && direction !== 'left') nextDirection = 'right';
    else if (dx < 0 && direction !== 'right') nextDirection = 'left';
  } else {
    if (dy > 0 && direction !== 'up') nextDirection = 'down';
    else if (dy < 0 && direction !== 'down') nextDirection = 'up';
  }
}, { passive: false });

// Buttons
function togglePause() {
  if (!gameRunning || gameOver) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
}
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('overlayBackBtn').addEventListener('click', goBack);
document.getElementById('startBtn').addEventListener('click', init);

// Show high score on start screen
const hs = getHS();
if (hs > 0) highScoreText.textContent = '🏆 最高分: ' + hs;

// Initial render
ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, GW, GH);
</script>
</body>
</html>
