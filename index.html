<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跳跳游戏 V2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Microsoft YaHei', sans-serif;
    user-select: none;
  }
  #statusBar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.5);
    width: 100%;
    z-index: 5;
    flex-shrink: 0;
  }
  .char-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    min-width: 90px;
    transition: all 0.3s;
  }
  .char-card.active {
    background: rgba(233,69,96,0.3);
    box-shadow: 0 0 12px rgba(233,69,96,0.6);
  }
  .char-card.eliminated {
    opacity: 0.35;
  }
  .char-card.eliminated .char-name { text-decoration: line-through; }
  .char-name { color: #fff; font-size: 13px; font-weight: bold; }
  .char-score { color: #ffd700; font-size: 12px; }
  .char-health { font-size: 11px; letter-spacing: 1px; }
  #gameArea {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  canvas { display: block; border-radius: 8px; }
  .score-pop {
    position: absolute;
    color: #ffd700;
    font-size: 28px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    animation: scorePop 0.8s ease-out forwards;
    z-index: 5;
  }
  @keyframes scorePop {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #fff;
    z-index: 10;
  }
  #overlay h1 { font-size: 42px; margin-bottom: 10px; }
  #overlay p { font-size: 18px; margin-bottom: 20px; color: #aaa; }
  #overlay .final-score { font-size: 28px; color: #ffd700; margin-bottom: 10px; }
  #overlay .char-results { margin-bottom: 20px; text-align: center; }
  #overlay .char-results div { font-size: 16px; color: #ccc; margin: 4px 0; }
  #overlay button {
    padding: 12px 40px;
    font-size: 20px;
    border: none;
    border-radius: 8px;
    background: #e94560;
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #overlay button:hover { transform: scale(1.05); }
  #overlay button:active { transform: scale(0.95); }
  #powerBar {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 12px;
    background: rgba(255,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
    pointer-events: none;
  }
  #powerFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00d2ff, #e94560);
    border-radius: 6px;
    transition: width 0.05s;
  }
  #gameButtons {
    position: absolute;
    top: 8px;
    right: 12px;
    display: none;
    gap: 6px;
    z-index: 6;
  }
  #gameButtons button {
    padding: 4px 12px;
    font-size: 12px;
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  #gameButtons button:hover { opacity: 1; }
  #backBtn { background: #555; }
  #restartBtn { background: #e94560; }
  #muteBtn {
    position: absolute;
    top: 8px;
    left: 12px;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 6;
    display: none;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  #muteBtn:hover { opacity: 1; }
</style>
</head>
<body>
<div id="statusBar"></div>
<div id="gameArea">
  <canvas id="game"></canvas>
  <button id="muteBtn">🔊</button>
  <div id="gameButtons">
    <button id="backBtn">返回</button>
    <button id="restartBtn">重新开始</button>
  </div>
  <div id="powerBar"><div id="powerFill"></div></div>
  <div id="overlay">
    <h1 style="font-size:36px;margin-bottom:4px;">🎮 跳跳游戏</h1>
    <p style="font-size:15px;color:#aaa;margin-bottom:16px;">按住蓄力，松开跳跃</p>
    <div class="final-score" id="finalScore" style="display:none"></div>
    <div class="char-results" id="charResults" style="display:none"></div>
    <div id="mainBtns" style="display:flex;flex-direction:column;align-items:center;gap:10px;width:90%;max-width:320px;">
      <div style="display:flex;gap:10px;width:100%;">
        <button id="startBtn" style="flex:1;padding:14px 0;font-size:20px;border:none;border-radius:10px;background:#e94560;color:#fff;cursor:pointer;">经典模式</button>
        <button id="arenaModeBtn" style="flex:1;padding:14px 0;font-size:20px;border:none;border-radius:10px;background:#533483;color:#fff;cursor:pointer;">竞技模式</button>
      </div>
      <div style="display:flex;gap:8px;width:100%;">
        <button id="testModeBtn" style="flex:1;padding:8px 0;font-size:14px;border:none;border-radius:8px;background:#0f3460;color:#fff;cursor:pointer;">测试模式</button>
        <button id="leaderboardBtn" style="flex:1;padding:8px 0;font-size:14px;border:none;border-radius:8px;background:#fb8500;color:#fff;cursor:pointer;">🏆 排行榜</button>
        <button id="skinStoreBtn" style="flex:1;padding:8px 0;font-size:14px;border:none;border-radius:8px;background:#e91e63;color:#fff;cursor:pointer;">🎨 皮肤</button>
      </div>
      <button id="homeBtn" style="padding:8px 30px;font-size:14px;border:none;border-radius:8px;background:#555;color:#fff;cursor:pointer;display:none;">返回首页</button>
    </div>
    <div id="highScoreArea" style="margin-top:12px;text-align:center;">
      <div id="highScoreDisplay" style="color:#ffd700;font-size:15px;"></div>
      <button id="clearScoreBtn" style="padding:4px 16px;font-size:12px;border:none;border-radius:6px;background:#555;color:#aaa;cursor:pointer;margin-top:6px;display:none;">清空记录</button>
    </div>
    <div id="bgSelectArea" style="margin-top:8px;text-align:center;"></div>
    <div id="authArea" style="margin-top:14px;text-align:center;"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const testModeBtn = document.getElementById('testModeBtn');
const finalScoreEl = document.getElementById('finalScore');
const charResultsEl = document.getElementById('charResults');
const powerFill = document.getElementById('powerFill');
const statusBarEl = document.getElementById('statusBar');
const gameButtonsEl = document.getElementById('gameButtons');
const backBtn = document.getElementById('backBtn');
const restartBtn = document.getElementById('restartBtn');
const highScoreDisplay = document.getElementById('highScoreDisplay');
const clearScoreBtn = document.getElementById('clearScoreBtn');
const homeBtn = document.getElementById('homeBtn');
const muteBtn = document.getElementById('muteBtn');

let gameMuted = false;

const W = 600, H = 650;
canvas.width = W;
canvas.height = H;

// 游戏状态
let platforms = [];
let player = null;
let gameRunning = false;
let charging = false;
let chargeStart = 0;
let chargePower = 0;
let maxCharge = 2000;
let jumpAnim = null;
let particles = [];
let cameraX = 0, cameraY = 0;
let targetCamX = 0, targetCamY = 0;
let nextDir = 1;
let sameDirCount = 0; // 连续同方向计数
let falling = false;
let fallSpeed = 0;
let shakeX = 0, shakeY = 0, shakeDuration = 0;
let roster = null;
let lastTime = 0;
let lastSafePlatformIdx = 0;
let lastSafeX = 0, lastSafeY = 0; // 记住玩家实际站立位置
let lastSafePlatform = null; // 记住安全平台引用（移动平台复活用）
let slipping = false; // 边缘滑落状态
let slipAnim = null;
let fallToBase = null; // 掉落到柱底动画
let testMode = false;

// === 背景主题系统 ===
const BG_THEMES = [
  { id: 'night', name: '夜空', bg: '#2b2b44', ground: '#232340', accent: '#1e2d4a', particle: '#445' },
  { id: 'desert', name: '黄土地', bg: '#c4ad8a', ground: '#b09878', accent: '#9a8568', particle: '#b9a' },
  { id: 'ocean', name: '海面', bg: '#5b8fad', ground: '#4a7a96', accent: '#3d6d88', particle: '#6a9' },
  { id: 'asphalt', name: '沥青路', bg: '#5a6670', ground: '#4a5660', accent: '#5e6e78', particle: '#778' },
  { id: 'sand', name: '沙地', bg: '#d8c89a', ground: '#c8b888', accent: '#b8a878', particle: '#cba' },
  { id: 'paved', name: '铺装地面', bg: '#8a9aa4', ground: '#7a8a94', accent: '#6e7e88', particle: '#9ab' },
  { id: 'wood', name: '木地板', bg: '#9e8878', ground: '#8a7468', accent: '#7a6458', particle: '#b98' },
  { id: 'grass', name: '草地', bg: '#6a9e6e', ground: '#5a8e5e', accent: '#4a7e4e', particle: '#7b8' },
  { id: 'snow', name: '雪地', bg: '#c8d4da', ground: '#b0bcc4', accent: '#98a8b2', particle: '#dde' },
  { id: 'lava', name: '熔岩', bg: '#8e5040', ground: '#6e3a2a', accent: '#a06048', particle: '#c86' },
  { id: 'space', name: '太空', bg: '#1e1e3a', ground: '#28204a', accent: '#3a2d5e', particle: '#548' },
  { id: 'cherry', name: '樱花', bg: '#e8c8d4', ground: '#d8b0c0', accent: '#c898aa', particle: '#ecd' },
];
const BG_PREF_KEY = 'jumpGame_bgTheme';
let currentBgTheme = null;
let bgDecorations = [];

let bgDecorations = [];
let bgLastCamX = 0, bgLastCamY = 0;

// parallax factor: 0 = fixed to screen, 1 = moves with world
const BG_PARALLAX = {
  star: 0.15, shootingStar: 0.1, distantStar: 0.1, nebula: 0.2,
  tumbleweed: 0.7, dustParticle: 0.4, fish: 0.5, duck: 0.5, bubble: 0.4,
  puddle: 0.8, tireMark: 0.8, sandGrain: 0.3, leaf: 0.35, woodGrain: 0.8,
  butterfly: 0.45, dandelion: 0.3, snowflake: 0.25, ember: 0.4, smoke: 0.35,
  petal: 0.3, cherryTree: 0.7
};

function getSelectedBgId() { return localStorage.getItem(BG_PREF_KEY) || 'random'; }
function setSelectedBgId(id) { localStorage.setItem(BG_PREF_KEY, id); }

function pickBgTheme() {
  const pref = getSelectedBgId();
  if (pref === 'random') {
    currentBgTheme = BG_THEMES[Math.floor(Math.random() * BG_THEMES.length)];
  } else {
    currentBgTheme = BG_THEMES.find(t => t.id === pref) || BG_THEMES[0];
  }
  bgLastCamX = cameraX; bgLastCamY = cameraY;
  initBgDecorations();
}

function spawnDeco(type, cx, cy) {
  const vx = cx, vy = cy;
  const rx = () => vx + Math.random() * W;
  const ry = () => vy + Math.random() * H;
  if (type === 'star') return { type, x: rx(), y: vy + Math.random() * H * 0.7, size: 1 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() * 1.5 };
  if (type === 'shootingStar') return { type, x: -50, y: 0, active: false, timer: 3000 + Math.random() * 5000, vx: 4, vy: 2, trail: [] };
  if (type === 'tumbleweed') return { type, x: rx(), y: vy + H * 0.75 + Math.random() * H * 0.15, r: 8 + Math.random() * 6, speed: 0.3 + Math.random() * 0.4, rot: 0 };
  if (type === 'dustParticle') return { type, x: rx(), y: vy + H * 0.5 + Math.random() * H * 0.4, size: 1 + Math.random() * 2, speed: 0.2 + Math.random() * 0.3, alpha: 0.2 + Math.random() * 0.3 };
  if (type === 'fish') return { type, x: rx(), y: vy + H * 0.5 + Math.random() * H * 0.35, size: 6 + Math.random() * 6, speed: 0.3 + Math.random() * 0.5, dir: Math.random() > 0.5 ? 1 : -1, color: ['#f4a460','#ffd700','#87ceeb','#ff8c69'][Math.floor(Math.random()*4)] };
  if (type === 'duck') return { type, x: rx(), y: vy + H * 0.35 + Math.random() * 30, speed: 0.15 + Math.random() * 0.2, dir: Math.random() > 0.5 ? 1 : -1, bob: Math.random() * Math.PI * 2 };
  if (type === 'bubble') return { type, x: rx(), y: vy + H * 0.6 + Math.random() * H * 0.35, size: 2 + Math.random() * 3, speed: 0.2 + Math.random() * 0.3, alpha: 0.15 + Math.random() * 0.2 };
  if (type === 'puddle') return { type, x: vx + 30 + Math.random() * (W - 60), y: vy + H * 0.7 + Math.random() * H * 0.2, w: 20 + Math.random() * 30, h: 4 + Math.random() * 4 };
  if (type === 'tireMark') return { type, x: rx(), y: vy + H * 0.65 + Math.random() * H * 0.25, len: 40 + Math.random() * 60, angle: -0.1 + Math.random() * 0.2 };
  if (type === 'sandGrain') return { type, x: rx(), y: ry(), size: 1 + Math.random(), speed: 0.5 + Math.random() * 0.8, alpha: 0.15 + Math.random() * 0.2 };
  if (type === 'leaf') return { type, x: rx(), y: ry(), size: 4 + Math.random() * 4, rot: Math.random() * Math.PI * 2, speed: 0.1 + Math.random() * 0.2, sway: Math.random() * Math.PI * 2, color: ['#c87','#b96','#a85','#d98'][Math.floor(Math.random()*4)] };
  if (type === 'woodGrain') return { type, x: rx(), y: ry(), len: 30 + Math.random() * 50, curve: Math.random() * 0.3 };
  if (type === 'butterfly') return { type, x: rx(), y: vy + H * 0.2 + Math.random() * H * 0.5, wingPhase: Math.random() * Math.PI * 2, vx: 0.2 + Math.random() * 0.3, vy: 0, dir: Math.random() > 0.5 ? 1 : -1, color: ['#e8a','#8ce','#ec8','#ae8'][Math.floor(Math.random()*4)] };
  if (type === 'dandelion') return { type, x: rx(), y: vy + Math.random() * H * 0.6, size: 2, speed: 0.05 + Math.random() * 0.1, sway: Math.random() * Math.PI * 2 };
  if (type === 'snowflake') return { type, x: rx(), y: ry(), size: 1.5 + Math.random() * 3, speed: 0.2 + Math.random() * 0.4, sway: Math.random() * Math.PI * 2, swaySpeed: 0.5 + Math.random() * 1 };
  if (type === 'ember') return { type, x: rx(), y: vy + H * 0.6 + Math.random() * H * 0.4, size: 1.5 + Math.random() * 2.5, speed: 0.3 + Math.random() * 0.5, alpha: 0.4 + Math.random() * 0.4, sway: Math.random() * Math.PI * 2 };
  if (type === 'smoke') return { type, x: rx(), y: vy + H * 0.7 + Math.random() * H * 0.2, size: 8 + Math.random() * 12, speed: 0.1 + Math.random() * 0.15, alpha: 0.08 + Math.random() * 0.08 };
  if (type === 'distantStar') return { type, x: rx(), y: ry(), size: 0.5 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 1 };
  if (type === 'nebula') return { type, x: vx + W * 0.3 + Math.random() * W * 0.4, y: vy + H * 0.2 + Math.random() * H * 0.3, size: 60 + Math.random() * 40, color: ['rgba(100,60,160,','rgba(60,80,160,','rgba(160,60,100,'][Math.floor(Math.random()*3)], pulse: 0 };
  if (type === 'petal') return { type, x: rx(), y: ry(), size: 3 + Math.random() * 3, rot: Math.random() * Math.PI * 2, speed: 0.15 + Math.random() * 0.25, sway: Math.random() * Math.PI * 2, swayAmp: 0.3 + Math.random() * 0.4 };
  if (type === 'cherryTree') return { type, x: vx + W * (0.1 + Math.random() * 0.8), baseY: vy + H * (0.82 + Math.random() * 0.08) };
  return { type, x: rx(), y: ry() };
}

function initBgDecorations() {
  bgDecorations = [];
  if (!currentBgTheme) return;
  const id = currentBgTheme.id;
  const cx = cameraX, cy = cameraY;
  if (id === 'night') {
    for (let i = 0; i < 60; i++) bgDecorations.push(spawnDeco('star', cx, cy));
    bgDecorations.push(spawnDeco('shootingStar', cx, cy));
  } else if (id === 'desert') {
    for (let i = 0; i < 3; i++) bgDecorations.push(spawnDeco('tumbleweed', cx, cy));
    for (let i = 0; i < 20; i++) bgDecorations.push(spawnDeco('dustParticle', cx, cy));
  } else if (id === 'ocean') {
    for (let i = 0; i < 4; i++) bgDecorations.push(spawnDeco('fish', cx, cy));
    for (let i = 0; i < 2; i++) bgDecorations.push(spawnDeco('duck', cx, cy));
    for (let i = 0; i < 15; i++) bgDecorations.push(spawnDeco('bubble', cx, cy));
  } else if (id === 'asphalt') {
    for (let i = 0; i < 5; i++) bgDecorations.push(spawnDeco('puddle', cx, cy));
    for (let i = 0; i < 3; i++) bgDecorations.push(spawnDeco('tireMark', cx, cy));
  } else if (id === 'sand') {
    for (let i = 0; i < 25; i++) bgDecorations.push(spawnDeco('sandGrain', cx, cy));
  } else if (id === 'paved') {
    for (let i = 0; i < 12; i++) bgDecorations.push(spawnDeco('leaf', cx, cy));
  } else if (id === 'wood') {
    for (let i = 0; i < 8; i++) bgDecorations.push(spawnDeco('woodGrain', cx, cy));
  } else if (id === 'grass') {
    for (let i = 0; i < 5; i++) bgDecorations.push(spawnDeco('butterfly', cx, cy));
    for (let i = 0; i < 8; i++) bgDecorations.push(spawnDeco('dandelion', cx, cy));
  } else if (id === 'snow') {
    for (let i = 0; i < 40; i++) bgDecorations.push(spawnDeco('snowflake', cx, cy));
  } else if (id === 'lava') {
    for (let i = 0; i < 20; i++) bgDecorations.push(spawnDeco('ember', cx, cy));
    for (let i = 0; i < 6; i++) bgDecorations.push(spawnDeco('smoke', cx, cy));
  } else if (id === 'space') {
    for (let i = 0; i < 80; i++) bgDecorations.push(spawnDeco('distantStar', cx, cy));
    bgDecorations.push(spawnDeco('nebula', cx, cy));
  } else if (id === 'cherry') {
    for (let i = 0; i < 30; i++) bgDecorations.push(spawnDeco('petal', cx, cy));
    bgDecorations.push(spawnDeco('cherryTree', cx, cy));
    bgDecorations.push(spawnDeco('cherryTree', cx, cy));
  }
}

function updateBgDecorations(dt) {
  const s = dt / 16.67;
  const cx = cameraX, cy = cameraY;
  const margin = 80;

  for (let i = bgDecorations.length - 1; i >= 0; i--) {
    const d = bgDecorations[i];
    const p = BG_PARALLAX[d.type] || 0.5;

    if (d.type === 'star') {
      d.twinkle += d.speed * 0.02 * s;
    } else if (d.type === 'shootingStar') {
      if (!d.active) { d.timer -= dt; if (d.timer <= 0) { d.active = true; d.x = cx + Math.random() * W * 0.5; d.y = cy + Math.random() * H * 0.3; d.trail = []; } }
      else { d.x += d.vx * s; d.y += d.vy * s; d.trail.push({x:d.x,y:d.y}); if (d.trail.length > 12) d.trail.shift(); if (d.x > cx + W + 50) { d.active = false; d.timer = 4000 + Math.random() * 6000; } }
    } else if (d.type === 'tumbleweed') {
      d.x += d.speed * s; d.rot += 0.03 * s;
    } else if (d.type === 'dustParticle') {
      d.x += d.speed * s;
    } else if (d.type === 'fish') {
      d.x += d.speed * d.dir * s;
    } else if (d.type === 'duck') {
      d.x += d.speed * d.dir * s; d.bob += 0.03 * s;
    } else if (d.type === 'bubble') {
      d.y -= d.speed * s;
    } else if (d.type === 'sandGrain') {
      d.x += d.speed * s; d.y -= 0.05 * s;
    } else if (d.type === 'leaf') {
      d.y += d.speed * s; d.sway += 0.02 * s; d.x += Math.sin(d.sway) * 0.3; d.rot += 0.01 * s;
    } else if (d.type === 'butterfly') {
      d.wingPhase += 0.08 * s; d.x += d.vx * d.dir * s; d.y += Math.sin(d.wingPhase * 0.5) * 0.3;
    } else if (d.type === 'dandelion') {
      d.y -= d.speed * s; d.sway += 0.015 * s; d.x += Math.sin(d.sway) * 0.2;
    } else if (d.type === 'snowflake') {
      d.y += d.speed * s; d.sway += d.swaySpeed * 0.02 * s; d.x += Math.sin(d.sway) * 0.4;
    } else if (d.type === 'ember') {
      d.y -= d.speed * s; d.sway += 0.03 * s; d.x += Math.sin(d.sway) * 0.5;
    } else if (d.type === 'smoke') {
      d.y -= d.speed * s; d.size += 0.02 * s;
    } else if (d.type === 'distantStar') {
      d.twinkle += d.speed * 0.02 * s;
    } else if (d.type === 'nebula') {
      d.pulse += 0.005 * s;
    } else if (d.type === 'petal') {
      d.y += d.speed * s; d.sway += 0.025 * s; d.x += Math.sin(d.sway) * d.swayAmp; d.rot += 0.02 * s;
    }

    // check screen position with parallax offset
    const sx = d.x - cx * p;
    const sy = (d.type === 'cherryTree' ? d.baseY : d.y) - cy * p;
    if ((sx < -margin || sx > W + margin || sy < -margin || sy > H + margin) && d.type !== 'shootingStar') {
      bgDecorations[i] = spawnDeco(d.type, cx, cy);
    }
  }

  bgLastCamX = cx;
  bgLastCamY = cy;
}

function drawBgDecorations() {
  const cx = cameraX, cy = cameraY;
  for (const d of bgDecorations) {
    const p = BG_PARALLAX[d.type] || 0.5;
    const ox = d.x - cx * p;
    const oy = d.y - cy * p;

    if (d.type === 'star') {
      const a = 0.3 + 0.5 * Math.abs(Math.sin(d.twinkle));
      ctx.fillStyle = `rgba(220,220,200,${a})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'shootingStar' && d.active) {
      for (let i = 0; i < d.trail.length; i++) {
        const a = (i / d.trail.length) * 0.6;
        const tx = d.trail[i].x - cx * p, ty = d.trail[i].y - cy * p;
        ctx.fillStyle = `rgba(240,240,200,${a})`;
        ctx.beginPath(); ctx.arc(tx, ty, 1.5 * (i / d.trail.length), 0, Math.PI * 2); ctx.fill();
      }
    } else if (d.type === 'tumbleweed') {
      ctx.save(); ctx.translate(ox, oy); ctx.rotate(d.rot);
      ctx.strokeStyle = 'rgba(160,130,80,0.4)'; ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) { const a = i * Math.PI / 3; ctx.beginPath(); ctx.arc(Math.cos(a)*d.r*0.3, Math.sin(a)*d.r*0.3, d.r*0.5, 0, Math.PI*2); ctx.stroke(); }
      ctx.restore();
    } else if (d.type === 'dustParticle') {
      ctx.fillStyle = `rgba(200,180,140,${d.alpha})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'fish') {
      ctx.save(); ctx.translate(ox, oy); if (d.dir < 0) ctx.scale(-1, 1);
      ctx.fillStyle = d.color; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.ellipse(0, 0, d.size, d.size * 0.45, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-d.size, 0); ctx.lineTo(-d.size - 4, -3); ctx.lineTo(-d.size - 4, 3); ctx.fill();
      ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(d.size * 0.5, -1, 1, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1; ctx.restore();
    } else if (d.type === 'duck') {
      const by = Math.sin(d.bob) * 2;
      ctx.save(); ctx.translate(ox, oy + by); if (d.dir < 0) ctx.scale(-1, 1);
      ctx.fillStyle = 'rgba(240,210,80,0.6)';
      ctx.beginPath(); ctx.ellipse(0, 0, 8, 5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, -4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(220,140,40,0.7)';
      ctx.beginPath(); ctx.moveTo(11, -4); ctx.lineTo(14, -3); ctx.lineTo(11, -2); ctx.fill();
      ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(9, -5, 0.8, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    } else if (d.type === 'bubble') {
      ctx.strokeStyle = `rgba(200,230,255,${d.alpha})`; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.stroke();
    } else if (d.type === 'puddle') {
      ctx.fillStyle = 'rgba(100,130,160,0.15)';
      ctx.beginPath(); ctx.ellipse(ox, oy, d.w, d.h, 0, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'tireMark') {
      ctx.save(); ctx.translate(ox, oy); ctx.rotate(d.angle);
      ctx.strokeStyle = 'rgba(40,40,40,0.12)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(d.len, 0); ctx.stroke();
      ctx.restore();
    } else if (d.type === 'sandGrain') {
      ctx.fillStyle = `rgba(180,160,120,${d.alpha})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'leaf') {
      ctx.save(); ctx.translate(ox, oy); ctx.rotate(d.rot);
      ctx.fillStyle = d.color + '8';
      ctx.beginPath(); ctx.ellipse(0, 0, d.size, d.size * 0.5, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = d.color + '6'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(-d.size, 0); ctx.lineTo(d.size, 0); ctx.stroke();
      ctx.restore();
    } else if (d.type === 'woodGrain') {
      ctx.strokeStyle = 'rgba(100,70,50,0.1)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ox, oy);
      ctx.quadraticCurveTo(ox + d.len * 0.5, oy + d.curve * 20, ox + d.len, oy);
      ctx.stroke();
    } else if (d.type === 'butterfly') {
      const wing = Math.sin(d.wingPhase) * 0.6;
      ctx.save(); ctx.translate(ox, oy);
      ctx.fillStyle = d.color + '8'; ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.ellipse(-3, wing * 3, 4, 6, wing, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(3, wing * 3, 4, 6, -wing, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#555'; ctx.globalAlpha = 0.5;
      ctx.fillRect(-0.5, -2, 1, 5);
      ctx.globalAlpha = 1; ctx.restore();
    } else if (d.type === 'dandelion') {
      ctx.fillStyle = 'rgba(255,255,240,0.35)';
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,240,0.2)'; ctx.lineWidth = 0.3;
      for (let i = 0; i < 5; i++) { const a = i * Math.PI * 2 / 5; ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ox + Math.cos(a) * 4, oy + Math.sin(a) * 4); ctx.stroke(); }
    } else if (d.type === 'snowflake') {
      ctx.fillStyle = 'rgba(240,245,255,0.5)';
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'ember') {
      ctx.fillStyle = `rgba(255,160,60,${d.alpha * 0.6})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(255,220,100,${d.alpha * 0.3})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size * 0.5, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'smoke') {
      ctx.fillStyle = `rgba(80,60,50,${d.alpha})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'distantStar') {
      const a = 0.2 + 0.4 * Math.abs(Math.sin(d.twinkle));
      ctx.fillStyle = `rgba(200,210,240,${a})`;
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'nebula') {
      const a = 0.06 + 0.03 * Math.sin(d.pulse);
      ctx.fillStyle = d.color + a + ')';
      ctx.beginPath(); ctx.arc(ox, oy, d.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = d.color + (a * 0.5) + ')';
      ctx.beginPath(); ctx.arc(ox + 20, oy + 15, d.size * 0.6, 0, Math.PI * 2); ctx.fill();
    } else if (d.type === 'petal') {
      ctx.save(); ctx.translate(ox, oy); ctx.rotate(d.rot);
      ctx.fillStyle = 'rgba(230,160,180,0.45)';
      ctx.beginPath(); ctx.ellipse(0, 0, d.size, d.size * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    } else if (d.type === 'cherryTree') {
      const ty = d.baseY - cy * p;
      ctx.fillStyle = 'rgba(80,50,60,0.2)';
      ctx.fillRect(ox - 3, ty - 50, 6, 50);
      ctx.fillStyle = 'rgba(200,140,160,0.18)';
      ctx.beginPath(); ctx.arc(ox, ty - 55, 30, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ox - 15, ty - 45, 20, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ox + 15, ty - 45, 20, 0, Math.PI * 2); ctx.fill();
    }
  }
}

function drawGameBg() {
  if (!currentBgTheme) pickBgTheme();
  const t = currentBgTheme;
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, W, H);
  const grd = ctx.createLinearGradient(0, H * 0.7, 0, H);
  grd.addColorStop(0, 'transparent');
  grd.addColorStop(1, t.ground + '40');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
  drawBgDecorations();
}

const HIGH_SCORE_KEY = 'jumpGame_highScore';

function getHighScore() {

}

// === 角色名称管理 ===
const PLAYER_NAME_KEY = 'jumpGame_playerName';
const LOGGED_IN_KEY = 'jumpGame_loggedInUser';
const AUTH_TOKEN_KEY = 'jumpGame_authToken';

function getPlayerName() {
  return getLoggedInUser() || localStorage.getItem(PLAYER_NAME_KEY) || '';
}

function savePlayerName(name) {
  localStorage.setItem(PLAYER_NAME_KEY, name.trim() || '角色1');
}

function getLoggedInUser() {
  return localStorage.getItem(LOGGED_IN_KEY) || '';
}

function getAuthToken() {
  return localStorage.getItem(AUTH_TOKEN_KEY) || '';
}

function setLoggedInUser(username, token) {
  localStorage.setItem(LOGGED_IN_KEY, username);
  localStorage.setItem(AUTH_TOKEN_KEY, token);
  savePlayerName(username);
}

function logoutUser() {
  localStorage.removeItem(LOGGED_IN_KEY);
  localStorage.removeItem(AUTH_TOKEN_KEY);
  playerCoins = 0;
  playerUnlockedSkins = ['default'];
  playerEquippedSkin = 'default';
}

function getApiBase() {
  const base = window.location.pathname.replace(/\/[^/]*$/, '');
  return (window.location.origin || 'http://localhost:3000') + base;
}

// 页面加载时验证 token
async function verifyAuth() {
  const username = getLoggedInUser();
  const token = getAuthToken();
  if (!username || !token) return;
  try {
    const resp = await fetch(getApiBase() + '/api/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, token })
    });
    const data = await resp.json();
    if (!data.ok) {
      // token 过期，清除登录状态
      logoutUser();
    } else {
      // 同步金币和皮肤数据
      await fetchCoinBalance();
      await fetchSkinData();
    }
  } catch(e) {
    // 网络错误不清除，下次再验证
  }
}

async function doAuth(action) {
  const userEl = document.getElementById('authUser');
  const passEl = document.getElementById('authPass');
  const msgEl = document.getElementById('authMsg');
  if (!userEl || !passEl) return;
  const username = userEl.value.trim();
  const password = passEl.value;
  if (!username || !password) { if (msgEl) msgEl.textContent = '请输入用户名和密码'; return; }
  const url = action === 'register' ? '/api/register' : '/api/login';
  try {
    if (msgEl) msgEl.textContent = '请稍候...';
    const resp = await fetch(getApiBase() + url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (data.ok) {
      setLoggedInUser(data.username, data.token);
      await fetchCoinBalance();
      await fetchSkinData();
      showOverlay(false);
    } else {
      if (msgEl) msgEl.textContent = data.error || '操作失败';
    }
  } catch(e) {
    if (msgEl) msgEl.textContent = '网络错误，请确认服务器已启动';
  }
}

async function submitCoins(amount) {
  const username = getLoggedInUser();
  const token = getAuthToken();
  if (!username || !token || amount <= 0) return;
  try {
    const resp = await fetch(getApiBase() + '/api/coins/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, token, amount })
    });
    const data = await resp.json();
    if (data.ok) playerCoins = data.coins;
  } catch(e) {}
}

async function fetchCoinBalance() {
  const username = getLoggedInUser();
  const token = getAuthToken();
  if (!username || !token) return;
  try {
    const resp = await fetch(getApiBase() + `/api/coins?username=${encodeURIComponent(username)}&token=${encodeURIComponent(token)}`);
    const data = await resp.json();
    if (data.coins !== undefined) playerCoins = data.coins;
  } catch(e) {}
}

async function fetchSkinData() {
  const username = getLoggedInUser();
  const token = getAuthToken();
  if (!username || !token) return;
  try {
    const resp = await fetch(getApiBase() + `/api/skins?username=${encodeURIComponent(username)}&token=${encodeURIComponent(token)}`);
    const data = await resp.json();
    if (data.unlockedSkins) playerUnlockedSkins = data.unlockedSkins;
    if (data.equippedSkin) playerEquippedSkin = data.equippedSkin;
  } catch(e) {}
}

async function submitScore(mode, score, platformIndex, rank) {
  const username = getLoggedInUser();
  const token = getAuthToken();
  if (!username || !token) return;
  try {
    await fetch(getApiBase() + '/api/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, token, mode, score, platformIndex, rank })
    });
  } catch(e) {}
}

function getSkinButtonState(skinId) {
  if (playerEquippedSkin === skinId) return 'equipped';
  if (playerUnlockedSkins.includes(skinId)) return 'equip';
  return 'buy';
}

function drawSkinPreview(cvs, skin) {
  const c = cvs.getContext('2d');
  const w = cvs.width, h = cvs.height;
  c.clearRect(0, 0, w, h);
  const px = w / 2, py = h - 6;
  const bw = 16, bh = 32;

  if (skin.type === 'advanced') {
    drawAdvancedChar(c, px, py, skin, bw, bh, 0);
    // 特效标记
    if (skin.effect) {
      c.font = '10px sans-serif';
      c.textAlign = 'center';
      const effectIcons = { flame: '🔥', trail: '💧', sparkle: '✨', glow: '💫' };
      c.fillText(effectIcons[skin.effect] || '⭐', px, 8);
    }
    return;
  }

  const bodyColor = skin.bodyColor || '#e94560';
  // 阴影
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.beginPath();
  c.ellipse(px, py + 2, bw * 0.6, 3, 0, 0, Math.PI * 2);
  c.fill();
  // 轮廓
  if (skin.outlineColor) {
    c.fillStyle = skin.outlineColor;
    c.beginPath();
    c.roundRect(px - bw / 2 - 1.5, py - bh - 1.5, bw + 3, bh + 3, [bw / 2 + 1, bw / 2 + 1, 5, 5]);
    c.fill();
  }
  // 身体
  c.fillStyle = bodyColor;
  c.beginPath();
  c.roundRect(px - bw / 2, py - bh, bw, bh, [bw / 2, bw / 2, 4, 4]);
  c.fill();
  // 内圈
  c.fillStyle = skin.innerColor;
  c.beginPath();
  c.roundRect(px - bw / 2 + 2, py - bh + 2, bw - 4, bh - 4, [bw / 2 - 2, bw / 2 - 2, 2, 2]);
  c.fill();
  // 眼睛
  c.fillStyle = skin.eyeColor;
  const eyeY = py - bh + bh * 0.35;
  c.beginPath();
  c.arc(px - 3, eyeY, skin.eyeSize * 0.8, 0, Math.PI * 2);
  c.arc(px + 3, eyeY, skin.eyeSize * 0.8, 0, Math.PI * 2);
  c.fill();
  // 高光
  c.fillStyle = skin.highlightColor;
  c.beginPath();
  c.arc(px - 2, eyeY - 1, 0.8, 0, Math.PI * 2);
  c.arc(px + 4, eyeY - 1, 0.8, 0, Math.PI * 2);
  c.fill();
  // 特效标记
  if (skin.effect) {
    c.font = '10px sans-serif';
    c.textAlign = 'center';
    const effectIcons = { flame: '🔥', trail: '💧', sparkle: '✨', glow: '💫', rainbow: '🌈' };
    c.fillText(effectIcons[skin.effect] || '⭐', px, py - bh - 6);
  }
}

const COLORS = ['#e94560','#0f3460','#533483','#00b4d8','#fb8500','#8338ec','#06d6a0','#ef476f'];
const CHAR_COLORS = ['#e94560','#00b4d8','#fb8500','#06d6a0','#8338ec'];
const SHAPE_TYPES = ['rectangle','circle','pentagon'];

// === 音效系统 (Web Audio API) ===
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, vol, ramp) {
  if (gameMuted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (ramp) osc.frequency.linearRampToValueAtTime(ramp, ctx.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

const SFX = {
  jump() {
    // 上升音调
    playTone(300, 0.25, 'sine', 0.12, 600);

};

// === Mulberry32 伪随机数生成器（竞技模式用） ===

function mulberry32(seed) {
  let t = seed | 0;
  return function() {
    t = (t + 0x6D2B79F5) | 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function seededRandom(prng, min, max) {
  return min + Math.floor(prng() * (max - min + 1));
}

// === 确定性赛道生成（竞技模式用） ===

function generateRacetrack(seed) {
  const prng = mulberry32(seed);
  const totalPlatforms = 20;
  const racetrack = [];
  let dir = 1;
  let sameCount = 0;

  // 第1个平台：起点
  const startPlat = new Platform(W / 2 - 50, H - 100, 100, PLATFORM_H, 'rectangle');
  startPlat.isMystery = false;
  startPlat.isStart = true;
  startPlat.isFinish = false;
  racetrack.push(startPlat);

  let lastPlat = startPlat;
  let lastMoving = false;

  for (let i = 1; i < totalPlatforms; i++) {
    // 方向
    let newDir = prng() > 0.5 ? 1 : -1;
    if (newDir === dir) {
      sameCount++;
      if (sameCount >= 3) { newDir = -newDir; sameCount = 1; }
    } else {
      sameCount = 1;
    }
    dir = newDir;

    // 平台宽度
    const pw = Math.max(MIN_PLATFORM_W, MIN_PLATFORM_W + prng() * (MAX_PLATFORM_W - MIN_PLATFORM_W));
    // 间距
    const minGap = (lastPlat.w + pw) / 2 + 60;
    const gap = minGap + prng() * 80;
    const nx = lastPlat.x + dir * gap * 0.5;
    const ny = lastPlat.y - gap * 0.3;
    // 形状
    const st = SHAPE_TYPES[Math.floor(prng() * SHAPE_TYPES.length)];
    const p = new Platform(nx, ny, pw, PLATFORM_H, st);
    // 颜色也用 seeded
    p.color = COLORS[Math.floor(prng() * COLORS.length)];
    p.movePhase = prng() * Math.PI * 2;

    // Mystery_Platform：第2-19个平台，20%概率
    const isLast = (i === totalPlatforms - 1);
    p.isMystery = (!isLast && prng() < 0.2);
    p.isStart = false;
    p.isFinish = isLast;

    // 特殊平台（互斥，不与上一个移动平台相邻）
    const specialRoll = prng();
    if (!lastMoving && !isLast && specialRoll < 0.25) {
      p.moving = true;
      p.moveSpeed = 0.0008 + prng() * 0.0008;
      p.moveRange = 16 + prng() * 20;
      p.baseX = nx;
      lastMoving = true;
    } else if (!isLast && specialRoll < 0.40) {
      p.shrinking = true;
      p.shrinkRate = 0.008 + prng() * 0.006;
      lastMoving = false;
    } else if (!isLast && specialRoll < 0.50) {
      p.timed = true;
      p.timerDuration = 2000 + prng() * 500;
      lastMoving = false;
    } else {
      lastMoving = false;
    }

    racetrack.push(p);
    lastPlat = p;
  }

  return racetrack;
}

// === 核心纯函数 ===

function calculatePower(chargeTime, maxCharge) {
  return Math.min(chargeTime, maxCharge) / maxCharge;
}

function calculateJumpDistance(power, minJump, maxJump) {
  return minJump + power * (maxJump - minJump);
}

function calculateScore(centerDistance, maxRadius) {
  if (maxRadius <= 0) return 50;
  const ratio = centerDistance / maxRadius;
  if (ratio <= 0.25) return 50;
  if (ratio <= 0.6) return 20;
  return 10;
}

function calculateParabola(t, startY, endY, height) {
  return startY + (endY - startY) * t - 4 * height * t * (1 - t);
}

function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.floor(r * (1 - amount));
  g = Math.floor(g * (1 - amount));
  b = Math.floor(b * (1 - amount));
  return `rgb(${r},${g},${b})`;
}

// 通用射线法：判断点是否在多边形内
function pointInPolygon(px, py, vertices) {
  let inside = false;
  for (let i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
    const xi = vertices[i][0], yi = vertices[i][1];
    const xj = vertices[j][0], yj = vertices[j][1];
    if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

// 生成等距投影的多边形顶点
function isoPolygon(cx, cy, w, sides, startAngle) {
  const r = w / 2;
  const verts = [];
  for (let i = 0; i < sides; i++) {
    const a = startAngle + (Math.PI * 2 * i) / sides;
    verts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r * 0.6]);
  }
  return verts;
}

// === Character 与 Roster ===

class Character {
  constructor(id, name, color) {
    this.id = id;
    this.name = name;
    this.color = color;
    this.score = 0;
    this.health = 5;
    this.alive = true;
  }
  addScore(pts) { this.score += pts; }
  takeDamage() {
    if (testMode) return;
    this.health = Math.max(0, this.health - 1);
    if (this.health === 0) this.alive = false;
  }
}

class CharacterRoster {
  constructor(chars) {
    this.characters = chars;
    this.currentIndex = 0;
  }
  getCurrent() { return this.characters[this.currentIndex]; }
  advance() {
    const start = this.currentIndex;
    do {
      this.currentIndex = (this.currentIndex + 1) % this.characters.length;
    } while (!this.characters[this.currentIndex].alive && this.currentIndex !== start);
  }
  allEliminated() { return this.characters.every(c => !c.alive); }
  getTotalScore() { return this.characters.reduce((s, c) => s + c.score, 0); }
}

// === SHAPES 形状系统 ===

const SHAPES = {
  rectangle: {
    drawTop(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(tx, ty - h);
      ctx.lineTo(tx + w/2, ty - h - w*0.3);
      ctx.lineTo(tx + w, ty - h);
      ctx.lineTo(tx + w/2, ty - h + w*0.3);
      ctx.closePath();
      ctx.fill();
    },
    drawLeft(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = darkenColor(color, 0.3);
      ctx.beginPath();
      ctx.moveTo(tx, ty - h);
      ctx.lineTo(tx + w/2, ty - h + w*0.3);
      ctx.lineTo(tx + w/2, ty + w*0.3);
      ctx.lineTo(tx, ty);
      ctx.closePath();
      ctx.fill();
    },
    drawRight(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = darkenColor(color, 0.15);
      ctx.beginPath();
      ctx.moveTo(tx + w, ty - h);
      ctx.lineTo(tx + w/2, ty - h + w*0.3);
      ctx.lineTo(tx + w/2, ty + w*0.3);
      ctx.lineTo(tx + w, ty);
      ctx.closePath();
      ctx.fill();
    },
    hitTest(px, py, cx, cy, w) {
      return Math.abs(px - cx) / (w/2) + Math.abs(py - cy) / (w*0.3) <= 1;
    },
    getCenter(x, y, w, h) { return { x: x + w/2, y: y - h }; },
    getMaxRadius(w) { return w * 0.3; }
  },

  circle: {
    drawTop(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(tx + w/2, ty - h, w/2, w*0.3, 0, 0, Math.PI*2);
      ctx.fill();
    },
    drawLeft(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = darkenColor(color, 0.25);
      ctx.beginPath();
      // 顶面椭圆下半弧左侧
      for (let a = Math.PI * 0.5; a <= Math.PI; a += 0.05) {
        const x = tx + w/2 + Math.cos(a) * w/2;
        const y = ty - h + Math.sin(a) * w*0.3;
        a === Math.PI * 0.5 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      // 底面椭圆下半弧左侧（反向）
      for (let a = Math.PI; a >= Math.PI * 0.5; a -= 0.05) {
        const x = tx + w/2 + Math.cos(a) * w/2;
        const y = ty + Math.sin(a) * w*0.3;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    },
    drawRight(ctx, tx, ty, w, h, color) {
      ctx.fillStyle = darkenColor(color, 0.12);
      ctx.beginPath();
      // 顶面椭圆下半弧右侧
      for (let a = 0; a <= Math.PI * 0.5; a += 0.05) {
        const x = tx + w/2 + Math.cos(a) * w/2;
        const y = ty - h + Math.sin(a) * w*0.3;
        a === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      // 底面椭圆下半弧右侧（反向）
      for (let a = Math.PI * 0.5; a >= 0; a -= 0.05) {
        const x = tx + w/2 + Math.cos(a) * w/2;
        const y = ty + Math.sin(a) * w*0.3;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
    },
    hitTest(px, py, cx, cy, w) {
      const dx = (px - cx) / (w/2);
      const dy = (py - cy) / (w*0.3);
      return dx*dx + dy*dy <= 1;
    },
    getCenter(x, y, w, h) { return { x: x + w/2, y: y - h }; },
    getMaxRadius(w) { return w * 0.3; }
  },

  pentagon: {
    drawTop(ctx, tx, ty, w, h, color) {
      const cx = tx + w/2, cy = ty - h;
      const verts = isoPolygon(cx, cy, w, 5, -Math.PI/2);
      ctx.fillStyle = color;
      ctx.beginPath();
      verts.forEach((v, i) => i === 0 ? ctx.moveTo(v[0], v[1]) : ctx.lineTo(v[0], v[1]));
      ctx.closePath();
      ctx.fill();
    },
    drawLeft(ctx, tx, ty, w, h, color) {
      const cx = tx + w/2, cy = ty - h;
      const verts = isoPolygon(cx, cy, w, 5, -Math.PI/2);
      // 左侧面：连接顶面左下边缘到底面
      ctx.fillStyle = darkenColor(color, 0.3);
      // 边 2→3 的侧面
      ctx.beginPath();
      ctx.moveTo(verts[2][0], verts[2][1]);
      ctx.lineTo(verts[3][0], verts[3][1]);
      ctx.lineTo(verts[3][0], verts[3][1] + h);
      ctx.lineTo(verts[2][0], verts[2][1] + h);
      ctx.closePath();
      ctx.fill();
      // 边 1→2 的侧面
      ctx.beginPath();
      ctx.moveTo(verts[1][0], verts[1][1]);
      ctx.lineTo(verts[2][0], verts[2][1]);
      ctx.lineTo(verts[2][0], verts[2][1] + h);
      ctx.lineTo(verts[1][0], verts[1][1] + h);
      ctx.closePath();
      ctx.fill();
    },
    drawRight(ctx, tx, ty, w, h, color) {
      const cx = tx + w/2, cy = ty - h;
      const verts = isoPolygon(cx, cy, w, 5, -Math.PI/2);
      ctx.fillStyle = darkenColor(color, 0.15);
      // 边 3→4 的侧面
      ctx.beginPath();
      ctx.moveTo(verts[3][0], verts[3][1]);
      ctx.lineTo(verts[4][0], verts[4][1]);
      ctx.lineTo(verts[4][0], verts[4][1] + h);
      ctx.lineTo(verts[3][0], verts[3][1] + h);
      ctx.closePath();
      ctx.fill();
      // 边 4→0 的侧面
      ctx.beginPath();
      ctx.moveTo(verts[4][0], verts[4][1]);
      ctx.lineTo(verts[0][0], verts[0][1]);
      ctx.lineTo(verts[0][0], verts[0][1] + h);
      ctx.lineTo(verts[4][0], verts[4][1] + h);
      ctx.closePath();
      ctx.fill();
    },
    hitTest(px, py, cx, cy, w) {
      return pointInPolygon(px, py, isoPolygon(cx, cy, w, 5, -Math.PI/2));
    },
    getCenter(x, y, w, h) { return { x: x + w/2, y: y - h }; },
    getMaxRadius(w) { return w * 0.28; }
  }
};

// === Platform 类 ===

class Platform {
  constructor(x, y, w, h, shapeType) {
    this.x = x;
    this.y = y;
    this.w = w;
    this.origW = w; // 原始宽度（缩小平台用）
    this.h = h;
    this.shapeType = shapeType || 'rectangle';
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.shape = SHAPES[this.shapeType];
    // 移动平台
    this.moving = false;
    this.moveSpeed = 0;
    this.moveRange = 0;
    this.movePhase = Math.random() * Math.PI * 2;
    this.baseX = x;
    // 缩小平台
    this.shrinking = false;
    this.shrinkRate = 0;
    this.minW = 25;
    this.shrinkDir = -1; // -1=缩小, 1=放大
    // 限时平台
    this.timed = false;
    this.timerDuration = 2000; // 2秒
    this.timerStart = 0; // 落地时设置
    this.timerActive = false;
    this.collapsed = false;
  }
  update(dt) {
    this.moveDeltaX = 0;
    if (this.moving && !this.collapsed) {
      const oldX = this.x;
      this.movePhase += dt * this.moveSpeed;
      this.x = this.baseX + Math.sin(this.movePhase) * this.moveRange;
      this.moveDeltaX = this.x - oldX;
    }
    if (this.shrinking && !this.collapsed) {
      this.w += this.shrinkDir * this.shrinkRate * dt;
      if (this.w <= this.minW) {
        this.w = this.minW;
        this.shrinkDir = 1; // 开始放大
      } else if (this.w >= this.origW) {
        this.w = this.origW;
        this.shrinkDir = -1; // 开始缩小
      }
    }
    if (this.timerActive && !this.collapsed) {
      const elapsed = Date.now() - this.timerStart;
      if (elapsed >= this.timerDuration) {
        this.collapsed = true;
      }
    }
  }
  getTimerRatio() {
    if (!this.timerActive || this.collapsed) return 0;
    return Math.min(1, (Date.now() - this.timerStart) / this.timerDuration);
  }
  draw(ox, oy) {
    if (this.collapsed) return; // 塌陷的平台不画
    const tx = this.x - ox, ty = this.y - oy;

    // 限时平台闪烁效果
    let alpha = 1;
    if (this.timerActive && !this.collapsed) {
      const ratio = this.getTimerRatio();
      if (ratio > 0.5) {
        alpha = 0.3 + Math.abs(Math.sin(Date.now() * 0.015)) * 0.7;
      }
    }
    ctx.globalAlpha = alpha;

    // 底部阴影
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.ellipse(tx + this.w/2, ty + this.w*0.1, this.w*0.4, this.w*0.1, 0, 0, Math.PI*2);
    ctx.fill();
    // 先画一个实心的前面填充，防止透出背景
    if (this.shapeType === 'circle') {
      ctx.fillStyle = darkenColor(this.color, 0.2);
      ctx.beginPath();
      ctx.ellipse(tx + this.w/2, ty - this.h, this.w/2, this.w*0.3, 0, 0, Math.PI);
      ctx.lineTo(tx, ty);
      ctx.ellipse(tx + this.w/2, ty, this.w/2, this.w*0.3, 0, Math.PI, 0, true);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = darkenColor(this.color, 0.2);
      ctx.beginPath();
      ctx.moveTo(tx, ty - this.h);
      ctx.lineTo(tx + this.w, ty - this.h);
      ctx.lineTo(tx + this.w, ty);
      ctx.lineTo(tx, ty);
      ctx.closePath();
      ctx.fill();
    }
    this.shape.drawLeft(ctx, tx, ty, this.w, this.h, this.color);
    this.shape.drawRight(ctx, tx, ty, this.w, this.h, this.color);
    this.shape.drawTop(ctx, tx, ty, this.w, this.h, this.color);

    // 特殊平台标记
    const cx = tx + this.w/2, cy = ty - this.h;
    if (this.moving) {
      // 移动平台：顶面画左右箭头
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('↔', cx, cy + 5);
    }
    if (this.shrinking) {
      // 缩小平台：顶面画收缩图标
      ctx.fillStyle = 'rgba(255,100,100,0.5)';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⊘', cx, cy + 5);
    }
    if (this.timed && this.timerActive) {
      // 限时平台：显示倒计时进度环
      const ratio = this.getTimerRatio();
      ctx.strokeStyle = ratio > 0.7 ? '#ff4444' : '#ffaa00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 8, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  }
  getTopCenter() { return this.shape.getCenter(this.x, this.y, this.w, this.h); }
  hitTest(px, py) {
    const c = this.getTopCenter();
    return this.shape.hitTest(px, py, c.x, c.y, this.w);
  }
  getMaxRadius() { return this.shape.getMaxRadius(this.w); }
}

// === Player 类 ===

class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 20; this.h = 40;
    this.squash = 0;
    this.onPlatform = 0;
    this.bounce = 0;
    this.rotation = 0;
  }
  draw(ox, oy) {
    const px = this.x - ox, py = this.y - oy;
    const bounceSquash = this.bounce > 0 ? Math.sin(this.bounce * Math.PI) * 0.15 : 0;
    const totalSquash = this.squash + bounceSquash;
    const squashH = this.h * (1 - totalSquash * 0.3);
    const squashW = this.w * (1 + totalSquash * 0.2);
    const squashOff = this.h - squashH;

    const skin = getEquippedSkin();

    ctx.save();
    ctx.translate(px, py - squashH/2 + squashOff);
    ctx.rotate(this.rotation);
    ctx.translate(-px, -(py - squashH/2 + squashOff));

    if (skin.type === 'advanced') {
      drawAdvancedChar(ctx, px, py + squashOff, skin, squashW, squashH, this.rotation);
      ctx.restore();
      return;
    }

    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(px, py + 2, squashW*0.6, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // 轮廓描边
    const bodyX = px - squashW/2, bodyY = py - squashH + squashOff;
    if (skin.outlineColor) {
      ctx.fillStyle = skin.outlineColor;
      ctx.beginPath();
      ctx.roundRect(bodyX - 1.5, bodyY - 1.5, squashW + 3, squashH + 3, [squashW/2 + 1, squashW/2 + 1, 5, 5]);
      ctx.fill();
    }

    // 身体 - 使用皮肤颜色，null 时沿用角色原色
    const charColor = skin.bodyColor || (roster ? roster.getCurrent().color : '#fff');
    ctx.fillStyle = charColor;
    ctx.beginPath();
    ctx.roundRect(bodyX, bodyY, squashW, squashH, [squashW/2, squashW/2, 4, 4]);
    ctx.fill();

    // 内圈
    ctx.fillStyle = skin.innerColor;
    ctx.beginPath();
    ctx.roundRect(bodyX + 3, bodyY + 3, squashW - 6, squashH - 6, [squashW/2 - 3, squashW/2 - 3, 2, 2]);
    ctx.fill();

    // 眼睛
    ctx.fillStyle = skin.eyeColor;
    const eyeY = bodyY + squashH * 0.35;
    ctx.beginPath();
    ctx.arc(px - 4, eyeY, skin.eyeSize, 0, Math.PI*2);
    ctx.arc(px + 4, eyeY, skin.eyeSize, 0, Math.PI*2);
    ctx.fill();

    // 高光
    ctx.fillStyle = skin.highlightColor;
    ctx.beginPath();
    ctx.arc(px - 3, eyeY - 1, 1, 0, Math.PI*2);
    ctx.arc(px + 5, eyeY - 1, 1, 0, Math.PI*2);
    ctx.fill();

    // 特效
    if (skin.effect) {
      drawSkinEffect(ctx, px, bodyY, squashW, squashH, skin.effect, charColor);
    }

    ctx.restore();
  }
}

// === 皮肤工具函数 ===
function getSkinById(skinId) {
  const skin = SKIN_REGISTRY.find(s => s.skinId === skinId);
  return skin || SKIN_REGISTRY.find(s => s.skinId === 'default');
}

function getEquippedSkin() {
  return getSkinById(playerEquippedSkin);
}

function pointsToCoins(points) {
  if (points === 50) return 5;
  if (points === 20) return 2;
  if (points === 10) return 1;
  return 0;
}

function drawSkinEffect(c, px, bodyY, w, h, effect, color) {
  const t = Date.now();
  switch (effect) {
    case 'flame': {
      for (let i = 0; i < 3; i++) {
        const ox = (Math.sin(t / 200 + i * 2) * w * 0.3);
        const oy = -h - 4 - Math.abs(Math.sin(t / 150 + i)) * 8;
        const r = 2 + Math.sin(t / 100 + i) * 1;
        c.fillStyle = `rgba(255,${100 + i * 50},0,${0.5 + Math.sin(t / 200 + i) * 0.3})`;
        c.beginPath();
        c.arc(px + ox, bodyY + oy, r, 0, Math.PI * 2);
        c.fill();
      }
      break;
    }
    case 'trail': {
      for (let i = 0; i < 4; i++) {
        const ox = Math.sin(t / 300 + i * 1.5) * w * 0.4;
        const oy = h + 2 + i * 3;
        c.fillStyle = `rgba(0,200,255,${0.3 - i * 0.06})`;
        c.beginPath();
        c.arc(px + ox, bodyY + oy, 2 - i * 0.3, 0, Math.PI * 2);
        c.fill();
      }
      break;
    }
    case 'sparkle': {
      for (let i = 0; i < 4; i++) {
        const angle = t / 500 + i * Math.PI / 2;
        const dist = w * 0.6 + Math.sin(t / 200 + i) * 3;
        const sx = px + Math.cos(angle) * dist;
        const sy = bodyY + h / 2 + Math.sin(angle) * h * 0.4;
        const alpha = 0.4 + Math.sin(t / 150 + i * 2) * 0.4;
        c.fillStyle = `rgba(255,255,200,${Math.max(0, alpha)})`;
        c.beginPath();
        c.arc(sx, sy, 1.5, 0, Math.PI * 2);
        c.fill();
      }
      break;
    }
    case 'glow': {
      const pulse = 0.15 + Math.sin(t / 400) * 0.1;
      c.fillStyle = `rgba(200,150,255,${pulse})`;
      c.beginPath();
      c.ellipse(px, bodyY + h / 2, w * 0.8, h * 0.6, 0, 0, Math.PI * 2);
      c.fill();
      break;
    }
  }
}

// === 进阶皮肤：人形角色绘制 ===
function drawAdvancedChar(c, px, py, skin, w, h, rotation) {
  // py = 脚底, w = 角色宽度, h = 角色高度
  const headR = w * 0.4;
  const bodyH = h * 0.38;
  const legH = h * 0.28;
  const headY = py - h + headR;
  const bodyTop = py - h + headR * 2;
  const bodyBot = bodyTop + bodyH;
  const legBot = py;

  // 阴影
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.beginPath();
  c.ellipse(px, py + 2, w * 0.5, 3, 0, 0, Math.PI * 2);
  c.fill();

  // 披风（在身体后面先画）
  if (skin.accessory === 'cape') {
    c.fillStyle = '#b71c1c';
    c.beginPath();
    c.moveTo(px - w * 0.4, bodyTop + 2);
    c.lineTo(px - w * 0.55, legBot + 2);
    c.lineTo(px + w * 0.55, legBot + 2);
    c.lineTo(px + w * 0.4, bodyTop + 2);
    c.closePath();
    c.fill();
  }

  // 腿
  const legW = w * 0.22;
  const legGap = w * 0.12;
  c.fillStyle = skin.legColor;
  c.fillRect(px - legGap - legW, bodyBot, legW, legH);
  c.fillRect(px + legGap, bodyBot, legW, legH);
  // 靴子
  c.fillStyle = skin.bootColor;
  const bootH = legH * 0.3;
  c.beginPath();
  c.roundRect(px - legGap - legW - 1, legBot - bootH, legW + 2, bootH, [0, 0, 3, 3]);
  c.fill();
  c.beginPath();
  c.roundRect(px + legGap - 1, legBot - bootH, legW + 2, bootH, [0, 0, 3, 3]);
  c.fill();

  // 身体
  c.fillStyle = skin.bodyColor;
  c.beginPath();
  c.roundRect(px - w * 0.4, bodyTop, w * 0.8, bodyH, [2, 2, 0, 0]);
  c.fill();
  // 腰带
  if (skin.beltColor) {
    c.fillStyle = skin.beltColor;
    c.fillRect(px - w * 0.4, bodyBot - 4, w * 0.8, 4);
    if (skin.beltBuckle) {
      c.fillStyle = '#ffd700';
      c.fillRect(px - 2, bodyBot - 5, 4, 5);
    }
  }
  // 医生红十字
  if (skin.accessory === 'cross') {
    c.fillStyle = '#f44336';
    c.fillRect(px - 2, bodyTop + bodyH * 0.2, 4, bodyH * 0.5);
    c.fillRect(px - 5, bodyTop + bodyH * 0.35, 10, 3);
  }

  // 头
  c.fillStyle = skin.headColor;
  c.beginPath();
  c.arc(px, headY, headR, 0, Math.PI * 2);
  c.fill();

  // 眼睛
  c.fillStyle = skin.eyeColor;
  c.beginPath();
  c.arc(px - headR * 0.35, headY - 1, 1.8, 0, Math.PI * 2);
  c.arc(px + headR * 0.35, headY - 1, 1.8, 0, Math.PI * 2);
  c.fill();
  // 高光
  c.fillStyle = '#fff';
  c.beginPath();
  c.arc(px - headR * 0.25, headY - 2, 0.7, 0, Math.PI * 2);
  c.arc(px + headR * 0.45, headY - 2, 0.7, 0, Math.PI * 2);
  c.fill();

  // 配饰
  const acc = skin.accessory;
  if (acc === 'hat' || acc === 'witchhat') {
    // 牛仔帽/女巫帽
    c.fillStyle = skin.hatColor;
    if (acc === 'witchhat') {
      // 尖帽
      c.beginPath();
      c.moveTo(px, headY - headR - 14);
      c.lineTo(px - headR * 1.1, headY - headR + 2);
      c.lineTo(px + headR * 1.1, headY - headR + 2);
      c.closePath();
      c.fill();
    } else {
      // 牛仔帽顶
      c.beginPath();
      c.roundRect(px - headR * 0.6, headY - headR - 6, headR * 1.2, 8, [3, 3, 0, 0]);
      c.fill();
    }
    // 帽檐
    if (skin.hatBrim) {
      c.fillRect(px - headR * 1.2, headY - headR + 1, headR * 2.4, 3);
    }
  } else if (acc === 'crown') {
    c.fillStyle = '#ffd700';
    const crY = headY - headR - 2;
    c.beginPath();
    c.moveTo(px - headR * 0.6, crY + 6);
    c.lineTo(px - headR * 0.6, crY);
    c.lineTo(px - headR * 0.3, crY + 3);
    c.lineTo(px, crY - 2);
    c.lineTo(px + headR * 0.3, crY + 3);
    c.lineTo(px + headR * 0.6, crY);
    c.lineTo(px + headR * 0.6, crY + 6);
    c.closePath();
    c.fill();
    // 宝石
    c.fillStyle = '#e91e63';
    c.beginPath();
    c.arc(px, crY + 2, 1.2, 0, Math.PI * 2);
    c.fill();
  } else if (acc === 'helmet') {
    // 宇航员头盔
    c.strokeStyle = skin.hatColor;
    c.lineWidth = 2;
    c.beginPath();
    c.arc(px, headY, headR + 3, 0, Math.PI * 2);
    c.stroke();
    // 面罩反光
    c.fillStyle = 'rgba(0,188,212,0.2)';
    c.beginPath();
    c.arc(px, headY, headR + 2, 0, Math.PI * 2);
    c.fill();
    c.lineWidth = 1;
  } else if (acc === 'mask') {
    // 忍者面罩
    c.fillStyle = skin.hatColor;
    c.fillRect(px - headR, headY - 2, headR * 2, 6);
    // 头巾
    c.beginPath();
    c.arc(px, headY, headR, Math.PI, 0);
    c.fill();
  } else if (acc === 'chefhat') {
    // 厨师帽
    c.fillStyle = '#fff';
    c.beginPath();
    c.roundRect(px - headR * 0.7, headY - headR - 10, headR * 1.4, 12, [4, 4, 0, 0]);
    c.fill();
    c.beginPath();
    c.arc(px, headY - headR - 10, headR * 0.7, 0, Math.PI * 2);
    c.fill();
  } else if (acc === 'bow') {
    // 蝴蝶结
    c.fillStyle = skin.hatColor;
    const bx = px + headR * 0.5, by = headY - headR * 0.6;
    c.beginPath();
    c.ellipse(bx - 3, by, 3, 2, -0.3, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.ellipse(bx + 3, by, 3, 2, 0.3, 0, Math.PI * 2);
    c.fill();
    c.fillRect(bx - 1, by - 1, 2, 2);
  } else if (acc === 'eyepatch') {
    // 海盗眼罩
    c.fillStyle = '#1a1a2e';
    c.beginPath();
    c.arc(px + headR * 0.35, headY - 1, 2.5, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = '#1a1a2e';
    c.lineWidth = 0.8;
    c.beginPath();
    c.moveTo(px - headR, headY - headR * 0.3);
    c.lineTo(px + headR, headY - headR * 0.3);
    c.stroke();
    c.lineWidth = 1;
    // 帽子
    c.fillStyle = skin.hatColor;
    c.beginPath();
    c.roundRect(px - headR * 0.7, headY - headR - 5, headR * 1.4, 7, [3, 3, 0, 0]);
    c.fill();
    if (skin.hatBrim) c.fillRect(px - headR * 1.2, headY - headR + 1, headR * 2.4, 2);
  } else if (acc === 'visor') {
    // 骑士面甲
    c.fillStyle = skin.hatColor;
    c.beginPath();
    c.arc(px, headY, headR + 1, 0, Math.PI * 2);
    c.fill();
    // T形面甲缝
    c.strokeStyle = '#424242';
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(px, headY - headR);
    c.lineTo(px, headY);
    c.moveTo(px - headR * 0.5, headY - 1);
    c.lineTo(px + headR * 0.5, headY - 1);
    c.stroke();
    // 眼睛透过面甲
    c.fillStyle = skin.eyeColor;
    c.fillRect(px - headR * 0.4, headY - 2, headR * 0.25, 2);
    c.fillRect(px + headR * 0.15, headY - 2, headR * 0.25, 2);
  } else if (acc === 'beret') {
    // 贝雷帽
    c.fillStyle = skin.hatColor;
    c.beginPath();
    c.ellipse(px, headY - headR, headR * 1.1, headR * 0.4, 0, 0, Math.PI * 2);
    c.fill();
  } else if (acc === 'antenna') {
    // 机器人天线
    c.strokeStyle = '#78909c';
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(px, headY - headR);
    c.lineTo(px, headY - headR - 8);
    c.stroke();
    c.fillStyle = '#00e5ff';
    c.beginPath();
    c.arc(px, headY - headR - 9, 2, 0, Math.PI * 2);
    c.fill();
    c.lineWidth = 1;
    // 方形头
    c.fillStyle = skin.headColor;
    c.fillRect(px - headR, headY - headR, headR * 2, headR * 2);
    c.fillStyle = skin.eyeColor;
    c.fillRect(px - headR * 0.4, headY - 2, 3, 3);
    c.fillRect(px + headR * 0.15, headY - 2, 3, 3);
  } else if (acc === 'cape') {
    // 吸血鬼尖牙（披风已在前面绘制）
    c.fillStyle = '#fff';
    c.beginPath();
    c.moveTo(px - 2, headY + headR * 0.4);
    c.lineTo(px - 1, headY + headR * 0.8);
    c.lineTo(px, headY + headR * 0.4);
    c.fill();
    c.beginPath();
    c.moveTo(px + 1, headY + headR * 0.4);
    c.lineTo(px + 2, headY + headR * 0.8);
    c.lineTo(px + 3, headY + headR * 0.4);
    c.fill();
  }

  // 特效
  if (skin.effect) {
    drawSkinEffect(c, px, py - h, w, h, skin.effect, skin.bodyColor);
  }
}

// === 平台生成 ===

function generateNextPlatform(basePlatform) {
  const last = basePlatform || platforms[platforms.length - 1];
  let newDir = Math.random() > 0.5 ? 1 : -1;
  if (newDir === nextDir) {
    sameDirCount++;
    if (sameDirCount >= 3) {
      newDir = -newDir;
      sameDirCount = 1;
    }
  } else {
    sameDirCount = 1;
  }
  nextDir = newDir;
  // 随跳跃次数平台逐渐变小（难度降低20%）
  const shrinkFactor = Math.min(jumpCount * 0.32, 12); // 最多缩小12px（原15）
  const pw = Math.max(MIN_PLATFORM_W, MIN_PLATFORM_W + Math.random() * (MAX_PLATFORM_W - MIN_PLATFORM_W) - shrinkFactor);
  // 间距随跳跃次数逐渐增大（难度降低20%）
  const extraGap = Math.min(jumpCount * 1.2, 32);
  const minGap = (last.w + pw) / 2 + 50 + extraGap;
  const gap = minGap + Math.random() * 100;
  const nx = last.x + nextDir * gap * 0.5;
  const ny = last.y - gap * 0.3;
  const st = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
  const p = new Platform(nx, ny, pw, PLATFORM_H, st);

  // 检查上一个平台是否是移动平台（防止相邻移动平台）
  const lastPlatMoving = last && last.moving;

  // 根据跳跃次数解锁难度机制（互斥，每个平台最多一种特殊效果）
  // 难度降低20%：解锁门槛提高，概率降低，速度/范围/缩放率减小，限时更宽裕
  if (!lastPlatMoving && jumpCount >= 10 && Math.random() < Math.min(0.24 + jumpCount * 0.006, 0.44)) {
    // 移动平台：速度和范围随跳跃次数增加（不与上一个移动平台相邻）
    p.moving = true;
    const speedBonus = Math.min(jumpCount * 0.000024, 0.0008);
    p.moveSpeed = 0.0008 + Math.random() * 0.0008 + speedBonus;
    p.moveRange = 16 + Math.random() * 20 + Math.min(jumpCount * 0.4, 12);
    p.baseX = nx;
  } else if (jumpCount >= 15 && Math.random() < Math.min(0.2 + jumpCount * 0.005, 0.36)) {
    // 缩小平台：缩得更慢
    p.shrinking = true;
    p.shrinkRate = 0.0096 + Math.random() * 0.008;
  } else if (jumpCount >= 22 && Math.random() < Math.min(0.16 + jumpCount * 0.004, 0.32)) {
    // 限时平台：时间更长
    p.timed = true;
    p.timerDuration = Math.max(1500, 2400 - jumpCount * 12);
  }

  platforms.push(p);
}

// === 首页背景动画 ===
let homeBgRunning = false;
let homeBgRaf = null;
let homeBgPlatforms = [];
let homeBgPlayer = { x: 0, y: 0, vy: 0, onPlat: 0, jumping: false, t: 0, startX: 0, startY: 0, targetX: 0, targetY: 0, height: 0, duration: 0, rotation: 0 };

function initHomeBg() {
  homeBgPlatforms = [];
  let x = 100 + Math.random() * 80, y = H - 80;
  let dir = Math.random() > 0.5 ? 1 : -1;
  let sameCount = 0;
  const maxSame = 2 + Math.floor(Math.random() * 2); // 同方向2~3根

  for (let i = 0; i < 7; i++) {
    const w = 50 + Math.random() * 40;
    const st = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
    homeBgPlatforms.push(new Platform(x, y, w, PLATFORM_H, st));

    sameCount++;
    if (sameCount >= maxSame) {
      dir = -dir;
      sameCount = 0;
    }

    // 随机间距，不要一模一样
    const gapX = 55 + Math.random() * 80;
    const gapY = 40 + Math.random() * 35;
    x += dir * gapX;
    y -= gapY;

    // 防止跑出画布
    if (x < 70) { x = 90 + Math.random() * 30; dir = 1; sameCount = 0; }
    if (x > W - 70) { x = W - 90 - Math.random() * 30; dir = -1; sameCount = 0; }
  }
  const tc = homeBgPlatforms[0].getTopCenter();
  homeBgPlayer = { x: tc.x, y: tc.y, onPlat: 0, jumping: false, t: 0, startX: tc.x, startY: tc.y, targetX: 0, targetY: 0, height: 0, duration: 600, rotation: 0, waitTimer: 0 };
}

function updateHomeBg(dt) {
  const bp = homeBgPlayer;
  if (!bp.jumping) {
    bp.waitTimer += dt;
    if (bp.waitTimer > 800) {
      bp.waitTimer = 0;
      bp.jumping = true;
      bp.t = 0;
      bp.startX = bp.x;
      bp.startY = bp.y;
      const nextIdx = (bp.onPlat + 1) % homeBgPlatforms.length;
      const tc = homeBgPlatforms[nextIdx].getTopCenter();
      bp.targetX = tc.x;
      bp.targetY = tc.y;
      bp.height = 40 + Math.random() * 60;
      bp.duration = 500 + Math.random() * 300;
      bp.onPlat = nextIdx;
    }
  } else {
    bp.t += dt / bp.duration;
    if (bp.t >= 1) {
      bp.t = 1;
      bp.x = bp.targetX;
      bp.y = bp.targetY;
      bp.jumping = false;
      bp.rotation = 0;
      // 跳到最后一个平台后回到第一个
      if (bp.onPlat >= homeBgPlatforms.length - 1) {
        bp.onPlat = -1; // 下次会变成0
        const tc = homeBgPlatforms[0].getTopCenter();
        bp.x = tc.x;
        bp.y = tc.y;
        bp.onPlat = 0;
        bp.waitTimer = -400;
      }
    } else {
      bp.x = bp.startX + (bp.targetX - bp.startX) * bp.t;
      bp.y = calculateParabola(bp.t, bp.startY, bp.targetY, bp.height);
      bp.rotation = bp.t * Math.PI * 2;
    }
  }
}

function renderHomeBg() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  // 深度排序：Y 小的先画（远处先画），营造立体感
  const sorted = [...homeBgPlatforms].sort((a, b) => a.y - b.y);
  ctx.globalAlpha = 0.35;
  for (const p of sorted) {
    p.draw(0, 0);
  }
  ctx.globalAlpha = 0.5;
  // 画小人
  const bp = homeBgPlayer;
  const px = bp.x, py = bp.y;
  const squashH = 40, squashW = 20;
  ctx.save();
  ctx.translate(px, py - squashH / 2);
  ctx.rotate(bp.rotation);
  ctx.translate(-px, -(py - squashH / 2));
  ctx.fillStyle = CHAR_COLORS[0];
  ctx.beginPath();
  ctx.roundRect(px - squashW / 2, py - squashH, squashW, squashH, [squashW / 2, squashW / 2, 4, 4]);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.roundRect(px - squashW / 2 + 3, py - squashH + 3, squashW - 6, squashH - 6, [squashW / 2 - 3, squashW / 2 - 3, 2, 2]);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  const eyeY = py - squashH + squashH * 0.35;
  ctx.beginPath();
  ctx.arc(px - 4, eyeY, 2.5, 0, Math.PI * 2);
  ctx.arc(px + 4, eyeY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

let homeBgLastTime = 0;
function homeBgLoop(timestamp) {
  if (!homeBgRunning) return;
  if (homeBgLastTime === 0) homeBgLastTime = timestamp;
  const dt = timestamp - homeBgLastTime;
  homeBgLastTime = timestamp;
  updateHomeBg(dt);
  renderHomeBg();
  homeBgRaf = requestAnimationFrame(homeBgLoop);
}

function startHomeBg() {
  if (homeBgRunning) return;
  homeBgRunning = true;
  homeBgLastTime = 0;
  initHomeBg();
  homeBgRaf = requestAnimationFrame(homeBgLoop);
