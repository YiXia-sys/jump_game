// === 跳跃系统 ===

function startJump(power) {
  SFX.jump();
  const dist = calculateJumpDistance(power, MIN_JUMP, MAX_JUMP);
  // 跳跃高度和时长与距离成正比
  const distRatio = (dist - MIN_JUMP) / (MAX_JUMP - MIN_JUMP);
  const jumpH = MIN_JUMP_HEIGHT + distRatio * (MAX_JUMP_HEIGHT - MIN_JUMP_HEIGHT);
  const jumpDur = 300 + distRatio * (JUMP_DURATION - 300); // 最短300ms，最长800ms
  // 跳跃方向始终朝向下一个平台的中心（移动平台预判偏移）
  const nextPlat = platforms[platforms.length - 1];
  const nextCenter = nextPlat.getTopCenter();
  let aimX = nextCenter.x;
  let aimY = nextCenter.y;
  // 对移动平台进行方向预判：根据平台当前移动方向，预测跳跃到达时的位置
  if (nextPlat.moving) {
    const estimatedFlightTime = 500; // 预估飞行时间(ms)
    const moveDir = Math.cos(nextPlat.movePhase); // 当前移动方向
    const predictOffset = moveDir * nextPlat.moveRange * 0.35; // 预判偏移量
    aimX += predictOffset;
  }
  const dx = aimX - player.x;
  const dy = aimY - player.y;
  const dirLen = Math.sqrt(dx * dx + dy * dy);
  const nx = dirLen > 0 ? dx / dirLen : 0;
  const ny = dirLen > 0 ? dy / dirLen : -1;
  jumpAnim = {
    startX: player.x, startY: player.y,
    targetX: player.x + nx * dist, targetY: player.y + ny * dist,
    origTargetX: player.x + nx * dist, origTargetY: player.y + ny * dist,
    origAimX: aimX, origAimY: aimY,
    trackingPlatform: nextPlat.moving,
    progress: 0, duration: jumpDur, height: jumpH,
    dirSign: dx >= 0 ? 1 : -1,
    power: power
  };
}

// === 落点检测与计分 ===

function checkLanding(x, y) {
  for (let i = platforms.length - 1; i >= 0; i--) {
    if (!platforms[i].collapsed && platforms[i].hitTest(x, y)) return { platform: platforms[i], index: i };
  }
  return null;
}

function handleLanding(platform, platformIdx, landX, landY) {
  const center = platform.getTopCenter();
  const dist = Math.sqrt((landX - center.x)**2 + (landY - center.y)**2);
  const maxR = platform.getMaxRadius();

  // 边缘滑落：检查人物脚部是否完全在形状内
  // 人物脚部半径约8px，检测脚部边缘4个点是否都在形状内
  const footR = 7;
  const footPoints = [
    [landX - footR, landY],
    [landX + footR, landY],
    [landX, landY - footR * 0.6],
    [landX, landY + footR * 0.6],
    [landX, landY] // 第5个点：中心点，提高容错到30%
  ];
  const insideCount = footPoints.filter(([fx, fy]) => platform.hitTest(fx, fy)).length;
  if (insideCount < 3) {
    // 脚没踩稳（少于3个点在平台内，20%容错），摇摇欲坠掉下去
    // 视觉修正：把玩家调整到50%踩在边缘，看起来踩不稳
    const angle = Math.atan2(landY - center.y, landX - center.x);
    const edgeDist = maxR * 0.95;
    const visualX = center.x + Math.cos(angle) * edgeDist;
    const visualY = center.y + Math.sin(angle) * edgeDist;
    slipAnim = {
      startX: visualX, startY: visualY,
      angle: angle,
      progress: 0,
      duration: 800,
      wobblePhase: 0
    };
    slipping = true;
    SFX.slip();
    player.x = visualX;
    player.y = visualY;
    player.rotation = 0;
    return;
  }

  // 边缘容错触发时（不是所有脚点都在平台内），把落点修正到平台范围内
  if (insideCount < 5) {
    const pullRatio = 0.4;
    landX = landX + (center.x - landX) * pullRatio;
    landY = landY + (center.y - landY) * pullRatio;
  }

  const landedOnNewPlatform = (platformIdx !== lastSafePlatformIdx || platforms.length <= 1);
  const points = landedOnNewPlatform ? calculateScore(dist, maxR) : 0;
  const cur = roster.getCurrent();
  if (points > 0) cur.addScore(points);
  if (points > 0 && getLoggedInUser()) sessionCoins += pointsToCoins(points);
  if (landedOnNewPlatform) jumpCount++;

  // 40关通关判定
  if (jumpCount >= 40 && landedOnNewPlatform) {
    player.x = landX;
    player.y = landY;
    player.rotation = 0;
    cur.addScore(100); // 通关奖励
    const sx = landX - cameraX, sy = landY - cameraY;
    showScorePop('🎉 通关! +100', sx, sy);
    spawnParticles(landX, landY, true);
    SFX.perfect();
    updateStatusBar();
    gameRunning = false;
    setTimeout(() => showOverlay(true), 1200);
    return;
  }

  // 玩家停在实际落点
  player.x = landX;
  player.y = landY;
  player.onPlatform = platformIdx;
  player.bounce = 1;
  player.rotation = 0;
  lastSafePlatformIdx = platformIdx;
  lastSafeX = landX;
  lastSafeY = landY;
  lastSafePlatform = platform;

  // 落地后停止缩放平台
  if (platform.shrinking) {
    platform.shrinking = false;
  }

  // 激活限时平台倒计时
  if (platform.timed && !platform.timerActive) {
    platform.timerActive = true;
    platform.timerStart = Date.now();
  }

  // 分数弹出
  // 音效与分数弹出
  if (points === 50) {
    SFX.perfect();
  } else {
    SFX.land();
  }
  if (points > 0) {
    const sx = landX - cameraX, sy = landY - cameraY;
    showScorePop('+' + points + (points === 50 ? ' ✨' : ''), sx, sy);
    if (points === 50) triggerShake(3, 120);
    spawnParticles(landX, landY, points === 50);
  }

  // 镜头跟随
  targetCamX = landX - W/2;
  targetCamY = landY - H/2 + 80;

  // 如果落回原来的平台（小跳），不清理也不生成新平台
  if (landedOnNewPlatform) {
    // 清理：只保留当前平台及之前的，然后生成下一个
    // 移除当前平台之后的所有旧平台（防止多余平台干扰方向）
    if (platformIdx < platforms.length - 1) {
      platforms.splice(platformIdx + 1);
    }
    // 清理当前平台之前的旧平台（保留最多2个历史）
    if (platformIdx > 2) {
      const remove = platformIdx - 2;
      platforms.splice(0, remove);
      player.onPlatform = Math.max(0, player.onPlatform - remove);
      lastSafePlatformIdx = Math.max(0, lastSafePlatformIdx - remove);
    }
    generateNextPlatform(platform);
  }

  // 切换角色
  roster.advance();
  updateStatusBar();
}

function handleFail() {
  SFX.hurt();
  const cur = roster.getCurrent();
  cur.takeDamage();

  if (roster.allEliminated()) {
    gameRunning = false;
    falling = true;
    fallSpeed = 2;
    updateStatusBar();
    return;
  }

  // 找到最近的平台底部作为掉落目标
  const safePlat = platforms[lastSafePlatformIdx];
  const baseY = safePlat ? safePlat.y + 20 : player.y + PLATFORM_H + 20;

  fallToBase = {
    startX: player.x,
    startY: player.y,
    targetY: baseY,
    progress: 0,
    duration: 500,
    impacted: false
  };

  updateStatusBar();
}

function triggerShake(intensity, duration) {
  shakeDuration = duration;
  shakeX = (Math.random() - 0.5) * intensity;
  shakeY = (Math.random() - 0.5) * intensity;
}

function showScorePop(text, x, y) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = text;
  el.style.left = (canvas.offsetLeft + x) + 'px';
  el.style.top = (canvas.offsetTop + y - 40) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// === 粒子系统 ===

function spawnParticles(x, y, isPerfect) {
  const count = isPerfect ? 20 : 8;
  const colors = isPerfect
    ? ['#ffd700','#ff6b6b','#00d2ff','#fff','#ff69b4']
    : ['#aaa','#ccc','#888','#ddd'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      alpha: 1,
      decay: 0.01 + Math.random() * 0.03,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 4
    });
  }
}

// 掉落到柱底的灰尘特效
function spawnDustParticles(x, y) {
  const colors = ['#8b7355','#a0926b','#c4b99a','#d4c9a8','#fff8dc'];
  for (let i = 0; i < 12; i++) {
    // 灰尘主要向两侧扩散
    const angle = -Math.PI * 0.1 + Math.random() * Math.PI * 0.2 + (i < 6 ? Math.PI : 0);
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + Math.random() * 5,
      vx: Math.cos(angle) * speed,
      vy: -Math.random() * 1.5,
      alpha: 0.8,
      decay: 0.015 + Math.random() * 0.02,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 3 + Math.random() * 5
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.alpha -= p.decay;
    if (p.alpha <= 0) particles.splice(i, 1);
  }
}

// === 镜头 ===

function updateCamera(dt) {
  cameraX += (targetCamX - cameraX) * CAMERA_LERP;
  cameraY += (targetCamY - cameraY) * CAMERA_LERP;
}

// === 游戏主循环 ===

function update(dt) {
  // 更新背景装饰动画
  updateBgDecorations(dt);
  // 更新所有平台（移动、缩小、限时）
  for (const p of platforms) {
    p.update(dt);
  }

  // 检查当前站立的平台状态
  if (gameRunning && !jumpAnim && !falling && !slipping && !fallToBase && player) {
    const curPlat = platforms[player.onPlatform];
    if (curPlat) {
      // 塌陷检测
      if (curPlat.collapsed) {
        SFX.collapse();
        const c = curPlat.getTopCenter();
        spawnDustParticles(c.x, c.y);
        triggerShake(5, 200);
        handleFail();
      }
      // 玩家跟随移动平台
      else if (curPlat.moving && curPlat.moveDeltaX !== 0) {
        player.x += curPlat.moveDeltaX;
        lastSafeX = player.x;
      }
      // 缩小平台：检测脚是否还在平台上
      if (curPlat.shrinking && !curPlat.collapsed) {
        if (!curPlat.hitTest(player.x, player.y)) {
          // 脚下的平台缩到踩不住了
          handleFail();
        }
      }
    }
  }

  if (charging && player) {
    chargePower = calculatePower(Date.now() - chargeStart, maxCharge);
    player.squash = chargePower;
    powerFill.style.width = (chargePower * 100) + '%';
  }

  if (jumpAnim) {
    jumpAnim.progress += dt / jumpAnim.duration;
    // 蓄力低于10%时不翻滚，只是小跳
    if (jumpAnim.power >= 0.25) {
      player.rotation = jumpAnim.progress * Math.PI * 2 * jumpAnim.dirSign;
    } else {
      player.rotation = 0;
    }
    // 实时追踪移动平台位置，避免空气墙
    const targetPlat = platforms[platforms.length - 1];
    if (targetPlat && targetPlat.moving && jumpAnim.trackingPlatform) {
      const tc = targetPlat.getTopCenter();
      const dx = tc.x - jumpAnim.origAimX;
      jumpAnim.targetX = jumpAnim.origTargetX + dx;
      jumpAnim.targetY = jumpAnim.origTargetY + (tc.y - jumpAnim.origAimY);
    }
    if (jumpAnim.progress >= 1) {
      jumpAnim.progress = 1;
      player.x = jumpAnim.targetX;
      player.y = jumpAnim.targetY;
      player.rotation = 0;
      const result = checkLanding(player.x, player.y);
      if (result) {
        handleLanding(result.platform, result.index, player.x, player.y);
      } else {
        handleFail();
      }
      jumpAnim = null;
    } else {
      const t = jumpAnim.progress;
      player.x = jumpAnim.startX + (jumpAnim.targetX - jumpAnim.startX) * t;
      player.y = calculateParabola(t, jumpAnim.startY, jumpAnim.targetY, jumpAnim.height);
    }
  }

  // 边缘滑落动画
  if (slipping && slipAnim) {
    slipAnim.progress += dt / slipAnim.duration;
    slipAnim.wobblePhase += dt * 0.02;
    // 先摇晃一下，然后滑下去
    if (slipAnim.progress < 0.4) {
      // 摇晃阶段
      const wobble = Math.sin(slipAnim.wobblePhase * 8) * 3 * (1 - slipAnim.progress / 0.4);
      player.rotation = wobble * 0.1;
    } else {
      // 滑落阶段
      const fallT = (slipAnim.progress - 0.4) / 0.6;
      const slideSpeed = fallT * fallT * 80;
      player.x = slipAnim.startX + Math.cos(slipAnim.angle) * slideSpeed;
      player.y = slipAnim.startY + Math.sin(slipAnim.angle) * slideSpeed + fallT * fallT * 60;
      player.rotation += dt * 0.008 * (slipAnim.angle > 0 ? 1 : -1);
    }
    if (slipAnim.progress >= 1) {
      slipping = false;
      slipAnim = null;
      handleFail();
    }
  }

  // 掉落到柱底动画
  if (fallToBase) {
    fallToBase.progress += dt / fallToBase.duration;
    const t = Math.min(fallToBase.progress, 1);
    // 加速下落 (easeIn)
    const eased = t * t;
    player.y = fallToBase.startY + (fallToBase.targetY - fallToBase.startY) * eased;
    player.rotation += dt * 0.006;

    // 落地瞬间
    if (t >= 1 && !fallToBase.impacted) {
      fallToBase.impacted = true;
      player.rotation = 0;
      // 落地灰尘特效
      spawnDustParticles(player.x, player.y);
      triggerShake(4, 150);
    }

    // 落地后短暂停留再复位
    if (fallToBase.progress >= 1.6) {
      fallToBase = null;
      // 如果安全平台已塌陷，重置它（保留所有特殊属性）
      const safePlat = platforms[lastSafePlatformIdx];
      if (safePlat && safePlat.collapsed) {
        safePlat.collapsed = false;
        // 恢复缩小平台的宽度
        if (safePlat.shrinking) {
          safePlat.w = safePlat.origW;
          safePlat.shrinking = false;
        }
        // 限时平台重新开始倒计时
        if (safePlat.timed) {
          safePlat.timerActive = true;
          safePlat.timerStart = Date.now();
        }
      }
      // 即使平台没塌陷，也要重新开始限时平台的倒计时
      const safePlat2 = platforms[lastSafePlatformIdx];
      if (safePlat2 && safePlat2.timed && safePlat2.timerActive) {
        safePlat2.timerStart = Date.now();
      }
      // 复位到安全位置
      if (lastSafePlatform && lastSafePlatform.moving) {
        const tc = lastSafePlatform.getTopCenter();
        player.x = tc.x;
        player.y = tc.y;
        lastSafeX = tc.x;
        lastSafeY = tc.y;
      } else {
        player.x = lastSafeX;
        player.y = lastSafeY;
      }
      player.onPlatform = lastSafePlatformIdx;
      player.rotation = 0;
      targetCamX = player.x - W/2;
      targetCamY = player.y - H/2 + 80;
      roster.advance();
      updateStatusBar();
    }
  }

  if (player && player.bounce > 0) {
    player.bounce -= dt * 0.004;
    if (player.bounce < 0) player.bounce = 0;
  }

  if (falling) {
    fallSpeed += 0.3;
    player.y += fallSpeed;
    player.rotation += 0.05;
    if (player.y > cameraY + H + 100) {
      falling = false;
      showOverlay(true);
    }
  }

  if (shakeDuration > 0) {
    shakeDuration -= dt;
    shakeX = (Math.random() - 0.5) * 4 * Math.max(0, shakeDuration / 150);
    shakeY = (Math.random() - 0.5) * 4 * Math.max(0, shakeDuration / 150);
  } else { shakeX = 0; shakeY = 0; }

  updateParticles(dt);
  updateCamera(dt);
}

function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  update(dt);
  render();
  if (gameRunning || falling || jumpAnim || slipping || fallToBase) {
    requestAnimationFrame(gameLoop);
  }
}

function render() {
  drawGameBg();
  const ox = cameraX + shakeX, oy = cameraY + shakeY;

  // 深度排序：Y 小的先画（远处先画）
  const sorted = [...platforms].sort((a, b) => a.y - b.y);
  for (const p of sorted) {
    p.draw(ox, oy);
  }

  // 粒子
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - ox, p.y - oy, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (player) player.draw(ox, oy);

  // 平台进度 HUD
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(jumpCount + ' / 40', W / 2, 24);
}

// === 竞技模式：NetworkClient ===

class NetworkClient {
  constructor() {
    this.ws = null;
    this.playerId = null;
    this.handlers = [];
    this.heartbeatInterval = null;
    this.reconnectAttempts = 0;
    this.maxReconnect = 3;
    this.url = null;
    this.onDisconnect = null;
    this.onReconnectFail = null;
  }
  connect(url) {
    this.url = url;
    return new Promise((resolve, reject) => {
      try {
        this.ws = new WebSocket(url);
        this.ws.onmessage = (e) => {
          try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'welcome') {
              this.playerId = msg.playerId;
              this.reconnectAttempts = 0;
              resolve();
              return;
            }
            this.handlers.forEach(h => h(msg));
          } catch(err) {}
        };
        this.ws.onclose = () => {
          this.stopHeartbeat();
          if (this.onDisconnect) this.onDisconnect();
          this.tryReconnect();
        };
        this.ws.onerror = () => reject(new Error('连接失败'));
      } catch(e) { reject(e); }
    });
  }
  send(msg) { if (this.ws && this.ws.readyState === 1) this.ws.send(JSON.stringify(msg)); }
  onMessage(handler) { this.handlers.push(handler); }
  startHeartbeat() {
    this.stopHeartbeat();
    this.heartbeatInterval = setInterval(() => this.send({ type: 'heartbeat' }), 2000);
  }
  stopHeartbeat() { if (this.heartbeatInterval) { clearInterval(this.heartbeatInterval); this.heartbeatInterval = null; } }
  tryReconnect() {
    if (this.reconnectAttempts >= this.maxReconnect) {
      if (this.onReconnectFail) this.onReconnectFail();
      return;
    }
    this.reconnectAttempts++;
    setTimeout(() => {
      this.connect(this.url).then(() => {
        this.startHeartbeat();
      }).catch(() => this.tryReconnect());
    }, 2000);
  }
  disconnect() { this.stopHeartbeat(); if (this.ws) this.ws.close(); }
}

async function arenaConnect(action) {
  const urlInput = document.getElementById('arenaUrlInput');
  const statusEl = document.getElementById('arenaStatus');
  arenaServerUrl = urlInput.value.trim();
  statusEl.textContent = '连接中...';

  arenaNet = new NetworkClient();
  try {
    await arenaNet.connect(arenaServerUrl);
  } catch(e) {
    statusEl.textContent = '连接失败，请检查服务器地址';
    return;
  }
  arenaNet.startHeartbeat();
  arenaLocalPlayerId = arenaNet.playerId;

  arenaNet.onMessage((msg) => handleArenaMessage(msg));
  arenaNet.onDisconnect = () => { if (arenaMode) showArenaDisconnect(); };
  arenaNet.onReconnectFail = () => { if (arenaMode) showArenaReconnectFail(); };

  const name = getPlayerName() || '玩家';
  if (action === 'create') {
    arenaNet.send({ type: 'create_room', playerName: name, skinId: playerEquippedSkin });
  } else {
    const code = document.getElementById('arenaCodeInput').value.trim().toUpperCase();
    if (!code || code.length !== 4) { statusEl.textContent = '请输入4位房间码'; return; }
    arenaNet.send({ type: 'join_room', roomCode: code, playerName: name, skinId: playerEquippedSkin });
  }
}

// === 竞技模式：消息处理 ===

function handleArenaMessage(msg) {
  switch (msg.type) {
    case 'room_created':
    case 'room_joined':
      arenaMode = true;
      showArenaRoom(msg.room || msg);
      break;
    case 'room_error':
      const s = document.getElementById('arenaStatus');
      if (s) s.textContent = msg.message;
      break;
    case 'player_list_update':
      if (arenaRoomState) {
        arenaRoomState.players = msg.players;
        showArenaRoom(arenaRoomState);
      }
      break;
    case 'host_changed':
      if (arenaRoomState) {
        arenaRoomState.hostId = msg.newHostId;
        showArenaRoom(arenaRoomState);
      }
      break;
    case 'game_start':
      arenaStartGame(msg.seed, msg.turnOrder);
      break;
    case 'turn_start':
      if (msg.roundNumber) arenaRoundNumber = msg.roundNumber;
      arenaOnTurnStart(msg.playerId);
      break;
    case 'dice_result':
      arenaOnDiceResult(msg.playerId, msg.value, msg.modifier);
      break;
    case 'jump_broadcast':
      if (msg.playerId !== arenaLocalPlayerId) arenaOnGhostJump(msg.playerId, msg.platformIndex, msg.chargePower);
      break;
    case 'land_result':
      arenaOnLandResult(msg.playerId, msg.success, msg.newIndex, msg.quotaLeft);
      break;
    case 'turn_end':
      break;
    case 'skip_turn':
      arenaShowPopup(arenaGetPlayerName(msg.playerId) + ' 被暂停！剩余 ' + msg.remainingSkips + ' 回合', '#ff6b6b');
      break;
    case 'mystery_result':
      arenaOnMysteryResult(msg);
      break;
    case 'event_effect':
      arenaOnEventEffect(msg.event, msg.affectedPlayers);
      break;
    case 'item_used':
      arenaOnItemUsed(msg);
      break;
    case 'game_end':
      arenaOnGameEnd(msg.winnerId, msg.rankings);
      break;
    case 'room_snapshot':
      arenaRoomState = msg.room;
      break;
    case 'room_reset':
      arenaMode = true;
      gameRunning = false;
      showArenaRoom(msg.room);
      break;
    case 'error':
      const se = document.getElementById('arenaStatus');
      if (se) se.textContent = msg.message;
      break;
  }
}

function arenaGetPlayerName(playerId) {
  if (!arenaRoomState) return '玩家';
  const p = arenaRoomState.players.find(x => x.id === playerId);
  return p ? p.name : '玩家';
}

function arenaGetPlayerColor(playerId) {
  if (!arenaRoomState) return '#fff';
  const p = arenaRoomState.players.find(x => x.id === playerId);
  return p ? p.color : '#fff';
}

function arenaGetPlayerSkinId(playerId) {
  if (!arenaRoomState) return 'default';
  const p = arenaRoomState.players.find(x => x.id === playerId);
  return p ? (p.skinId || 'default') : 'default';
}

// === 竞技模式：游戏控制器 ===

function arenaStartGame(seed, turnOrder) {
  pickBgTheme();
  arenaRacetrack = generateRacetrack(seed);
  arenaRoomState.turnOrder = turnOrder;
  arenaRoundNumber = 1;
  arenaPlayerStates.clear();
  arenaGhosts = [];

  for (const pid of turnOrder) {
    arenaPlayerStates.set(pid, {
      platformIndex: 1,
      items: [],
      skipTurns: 0,
      hasShield: false,
      totalJumps: 0,
      successfulJumps: 0,
      eventsTriggered: 0,
      activeEffects: [],
      autoLandRemaining: 0
    });
  }

  // 初始化游戏引擎
  platforms = arenaRacetrack;
  const tc = platforms[0].getTopCenter();
  player = new Player(tc.x, tc.y);
  player.onPlatform = 0;
  cameraX = tc.x - W / 2;
  cameraY = tc.y - H / 2 + 80;
  targetCamX = cameraX;
  targetCamY = cameraY;
  gameRunning = true;
  arenaMode = true;
  charging = false;
  jumpAnim = null;
  falling = false;
  slipping = false;
  fallToBase = null;
  particles = [];

  overlay.style.display = 'none';
  gameButtonsEl.style.display = 'none';
  muteBtn.style.display = 'flex';
  lastTime = 0;
  requestAnimationFrame(arenaGameLoop);
}

function arenaOnTurnStart(playerId) {
  arenaCurrentTurnId = playerId;
  arenaIsMyTurn = (playerId === arenaLocalPlayerId);
  if (arenaIsMyTurn) {
    ArenaSFX.turnStart();
    arenaWaitingForDiceClick = true;
  }

  // 重置所有限时平台和缩小平台（每个回合重新开始）
  for (const plat of arenaRacetrack) {
    if (plat.timed) {
      plat.collapsed = false;
      plat.timerActive = false;
      plat.timerStart = 0;
    }
    if (plat.shrinking === false && plat.shrinkRate > 0) {
      // 恢复被停止的缩小平台
      plat.shrinking = true;
      plat.w = plat.origW;
    }
  }

  // 镜头移到当前玩家
  const state = arenaPlayerStates.get(playerId);
  if (state && arenaRacetrack[state.platformIndex - 1]) {
    const tc = arenaRacetrack[state.platformIndex - 1].getTopCenter();
    targetCamX = tc.x - W / 2;
    targetCamY = tc.y - H / 2 + 80;
  }
  arenaShowPopup(arenaGetPlayerName(playerId) + ' 的回合', arenaGetPlayerColor(playerId));
}

function arenaOnDiceResult(playerId, value, modifier) {
  ArenaSFX.diceRoll();
  arenaWaitingForDiceClick = false;

  // 骰子滚动动画
  arenaDiceAnimating = true;
  let ticks = 0;
  const totalTicks = 15;
  if (arenaDiceAnimTimer) clearInterval(arenaDiceAnimTimer);
  arenaDiceAnimTimer = setInterval(() => {
    arenaDiceAnimValue = Math.floor(Math.random() * 6) + 1;
    ticks++;
    if (ticks >= totalTicks) {
      clearInterval(arenaDiceAnimTimer);
      arenaDiceAnimTimer = null;
      arenaDiceAnimating = false;
      arenaDiceValue = value;
      arenaJumpQuota = value;
      arenaDiceShowResult = 90; // 约1.5秒展示结果
      arenaShowPopup('🎲 ' + value, '#ffd700');
      if (arenaIsMyTurn) {
        const state = arenaPlayerStates.get(arenaLocalPlayerId);
        if (state) {
          const platIdx = state.platformIndex - 1;
          if (arenaRacetrack[platIdx]) {
            const tc = arenaRacetrack[platIdx].getTopCenter();
            player.x = tc.x;
            player.y = tc.y;
            player.onPlatform = platIdx;
            targetCamX = tc.x - W / 2;
            targetCamY = tc.y - H / 2 + 80;
          }
        }
      }
    }
  }, 80);
}

function arenaOnLandResult(playerId, success, newIndex, quotaLeft) {
  const state = arenaPlayerStates.get(playerId);
  if (state) {
    state.platformIndex = newIndex;
    state.totalJumps++;
    if (success) state.successfulJumps++;
  }
  arenaJumpQuota = quotaLeft;

  if (playerId === arenaLocalPlayerId && success) {
    // 检查是否是 Mystery_Platform
    const plat = arenaRacetrack[newIndex - 1];
    if (plat && plat.isMystery) {
      arenaNet.send({ type: 'trigger_mystery', platformIndex: newIndex });
    }
  }
}

function arenaOnGhostJump(playerId, platformIndex, chargePower) {
  const state = arenaPlayerStates.get(playerId);
  if (!state) return;
  const fromIdx = state.platformIndex - 1;
  const toIdx = fromIdx + 1;
  if (fromIdx < 0 || toIdx >= arenaRacetrack.length) return;
  const from = arenaRacetrack[fromIdx].getTopCenter();
  const to = arenaRacetrack[toIdx].getTopCenter();
  arenaGhosts.push({
    playerId, color: arenaGetPlayerColor(playerId), name: arenaGetPlayerName(playerId),
    skinId: arenaGetPlayerSkinId(playerId),
    startX: from.x, startY: from.y, targetX: to.x, targetY: to.y,
    progress: 0, duration: 600, height: 40 + chargePower * 110
  });
}

function arenaOnMysteryResult(msg) {
  ArenaSFX.mystery();
  if (msg.resultType === 'event' && msg.event) {
    arenaShowPopup(msg.event.name, msg.event.category === 'lucky' ? '#06d6a0' : '#ff6b6b');
  } else if (msg.resultType === 'item' && msg.item) {
    arenaShowPopup('获得道具: ' + arenaItemName(msg.item), '#ffd700');
    const state = arenaPlayerStates.get(msg.playerId);
    if (state && state.items.length < 2) state.items.push(msg.item);
  } else if (msg.resultType === 'shielded') {
    arenaShowPopup('护盾抵消了 ' + msg.event.name, '#00b4d8');
  }
}

function arenaOnEventEffect(event, affectedPlayers) {
  if (!affectedPlayers) return;
  for (const eff of affectedPlayers) {
    if (eff.playerId === arenaLocalPlayerId) {
      if (event.category === 'disaster' || event.category === 'penalty') {
        ArenaSFX.warning();
      } else {
        ArenaSFX.lucky();
      }
    }
    const state = arenaPlayerStates.get(eff.playerId);
    if (state) {
      if (eff.newIndex !== undefined) state.platformIndex = eff.newIndex;
      if (eff.skipTurns !== undefined) state.skipTurns = eff.skipTurns;
      // 监狱：清空剩余步数
      if (eff.clearQuota && eff.playerId === arenaLocalPlayerId) {
        arenaJumpQuota = 0;
      }
      // 医院：增加步数
      if (eff.bonusQuota && eff.playerId === arenaLocalPlayerId) {
        arenaJumpQuota += eff.bonusQuota;
      }
    }
    // 位置变化时更新本地玩家视觉
    if (eff.newIndex !== undefined && eff.playerId === arenaLocalPlayerId && player) {
      const plat = arenaRacetrack[eff.newIndex - 1];
      if (plat) {
        const tc = plat.getTopCenter();
        player.x = tc.x;
        player.y = tc.y;
        player.onPlatform = eff.newIndex - 1;
        targetCamX = tc.x - W / 2;
        targetCamY = tc.y - H / 2 + 80;
      }
    }
  }
}

function arenaOnItemUsed(msg) {
  ArenaSFX.itemUse();
  arenaShowPopup(arenaGetPlayerName(msg.playerId) + ' 使用了 ' + arenaItemName(msg.itemType), '#ffd700');
  const state = arenaPlayerStates.get(msg.playerId);
  if (state) {
    const idx = state.items.indexOf(msg.itemType);
    if (idx !== -1) state.items.splice(idx, 1);
    if (msg.effect) {
      if (msg.effect.type === 'auto_land') state.autoLandRemaining = arenaJumpQuota;
      if (msg.effect.type === 'shield') state.hasShield = true;
    }
  }
  if (msg.effect && msg.effect.newQuota !== undefined) arenaJumpQuota = msg.effect.newQuota;
  // 退后卡/冻结卡效果更新
  if (msg.effect && msg.effect.targetId) {
    const targetState = arenaPlayerStates.get(msg.effect.targetId);
    if (targetState) {
      if (msg.effect.newIndex !== undefined) targetState.platformIndex = msg.effect.newIndex;
      if (msg.effect.type === 'freeze') targetState.skipTurns = Math.max(targetState.skipTurns, 1);
    }
  }
}

function arenaOnGameEnd(winnerId, rankings) {
  gameRunning = false;
  arenaMode = false;
  if (winnerId === arenaLocalPlayerId) ArenaSFX.victory();
  // 提交竞技模式分数
  const myRanking = rankings.find(r => r.playerId === arenaLocalPlayerId);
  if (myRanking) {
    submitScore('arena', 0, myRanking.platformIndex, myRanking.rank);
  }
  arenaShowRankScreen(rankings);
}

function arenaItemName(type) {
  const names = { auto_land: '必中卡', pushback: '退后卡', freeze: '暂停卡', shield: '护盾卡', speed_boost: '加速卡' };
  return names[type] || type;
}

function arenaShowPopup(text, color) {
  arenaEventPopups.push({ text, color: color || '#fff', alpha: 1, y: H / 2 - 50 });
}

// === 竞技模式：排名界面 ===

function arenaShowRankScreen(rankings) {
  overlay.style.display = 'flex';
  muteBtn.style.display = 'none';
  let html = '<h1 style="font-size:28px">🏆 对局结束</h1>';
  for (const r of rankings) {
    const crown = r.isWinner ? '👑 ' : '';
    const color = arenaGetPlayerColor(r.playerId);
    html += `<div style="color:${color};font-size:16px;margin:4px 0;">${crown}#${r.rank} ${r.playerName} - 第${r.platformIndex}格 | 跳跃${r.totalJumps}次 成功率${r.successRate}%</div>`;
  }
  html += `
    <button id="arenaAgainBtn" style="padding:10px 30px;font-size:16px;border:none;border-radius:8px;background:#533483;color:#fff;cursor:pointer;margin-top:15px;">再来一局</button>
    <button id="arenaHomeBtn" style="padding:8px 20px;font-size:14px;border:none;border-radius:6px;background:#555;color:#fff;cursor:pointer;margin-top:8px;">返回首页</button>
  `;
  overlay.innerHTML = html;
  document.getElementById('arenaAgainBtn').onclick = () => {
    arenaNet.send({ type: 'restart_room' });
  };
  document.getElementById('arenaHomeBtn').onclick = () => {
    if (arenaNet) arenaNet.disconnect();
    arenaMode = false;
    showOverlay(false);
  };
}

// === 竞技模式：跳跃处理 ===

function arenaStartCharge() {
  if (!arenaIsMyTurn || arenaJumpQuota <= 0 || jumpAnim || charging || falling || slipping || fallToBase || arenaWaitingForDiceClick || arenaDiceAnimating) return;

  // 检查是否点击了道具栏区域（阻止蓄力）
  if (arenaLastPointerX !== null) {
    const localState = arenaPlayerStates.get(arenaLocalPlayerId);
    if (localState) {
      const itemY = H - 50;
      for (let i = 0; i < 2; i++) {
        const ix = W - 90 + i * 42;
        if (arenaLastPointerX >= ix && arenaLastPointerX <= ix + 38 && arenaLastPointerY >= itemY && arenaLastPointerY <= itemY + 38) {
          if (localState.items[i]) {
            arenaUseItem(localState.items[i]);
            return;
          }
        }
      }
    }
    // 检查退出按钮
    if (arenaExitBtnRect) {
      const b = arenaExitBtnRect;
      if (arenaLastPointerX >= b.x && arenaLastPointerX <= b.x + b.w && arenaLastPointerY >= b.y && arenaLastPointerY <= b.y + b.h) {
        return;
      }
    }
  }

  charging = true;
  chargeStart = Date.now();
}

function arenaReleaseCharge() {
  if (!charging || !arenaIsMyTurn) return;
  const chargeTime = Date.now() - chargeStart;
  const power = calculatePower(chargeTime, maxCharge);
  charging = false;
  chargePower = 0;
  player.squash = 0;
  powerFill.style.width = '0%';

  const state = arenaPlayerStates.get(arenaLocalPlayerId);
  if (!state) return;
  const currentIdx = state.platformIndex - 1;
  const nextIdx = currentIdx + 1;
  if (nextIdx >= arenaRacetrack.length) return;

  // 发送跳跃消息
  arenaNet.send({ type: 'jump', platformIndex: currentIdx, chargePower: power });

  SFX.jump();
  const nextPlat = arenaRacetrack[nextIdx];
  const nextCenter = nextPlat.getTopCenter();
  let aimX = nextCenter.x, aimY = nextCenter.y;
  if (nextPlat.moving) {
    const moveDir = Math.cos(nextPlat.movePhase);
    aimX += moveDir * nextPlat.moveRange * 0.35;
  }

  // 计算跳跃距离和方向 — 始终朝向下一个平台
  const dx = aimX - player.x;
  const dy = aimY - player.y;
  const realDist = Math.sqrt(dx * dx + dy * dy);
  const dist = calculateJumpDistance(power, MIN_JUMP, MAX_JUMP);
  const distRatio = (dist - MIN_JUMP) / (MAX_JUMP - MIN_JUMP);
  const jumpH = MIN_JUMP_HEIGHT + distRatio * (MAX_JUMP_HEIGHT - MIN_JUMP_HEIGHT);
  const jumpDur = 300 + distRatio * (JUMP_DURATION - 300);

  // 目标点：沿着当前平台到下一个平台的方向，按跳跃距离计算
  const nx = realDist > 0 ? dx / realDist : 0;
  const ny = realDist > 0 ? dy / realDist : -1;

  jumpAnim = {
    startX: player.x, startY: player.y,
    targetX: player.x + nx * dist, targetY: player.y + ny * dist,
    progress: 0, duration: jumpDur, height: jumpH,
    dirSign: dx >= 0 ? 1 : -1, power: power,
    arenaTargetIdx: nextIdx
  };
}

function arenaHandleLanding() {
  if (!jumpAnim || !jumpAnim.arenaTargetIdx) return;
  const targetPlat = arenaRacetrack[jumpAnim.arenaTargetIdx];
  const success = targetPlat && !targetPlat.collapsed && targetPlat.hitTest(player.x, player.y);

  if (success) {
    SFX.land();
    const tc = targetPlat.getTopCenter();
    player.x = tc.x;
    player.y = tc.y;
    player.onPlatform = jumpAnim.arenaTargetIdx;
    spawnParticles(player.x, player.y, false);
    targetCamX = player.x - W / 2;
    targetCamY = player.y - H / 2 + 80;
    // 落地后停止缩放平台
    if (targetPlat.shrinking) targetPlat.shrinking = false;
    // 激活限时平台倒计时
    if (targetPlat.timed && !targetPlat.timerActive) {
      targetPlat.timerActive = true;
      targetPlat.timerStart = Date.now();
    }
  } else {
    SFX.hurt();
    // 回到原平台
    const state = arenaPlayerStates.get(arenaLocalPlayerId);
    if (state) {
      const origPlat = arenaRacetrack[state.platformIndex - 1];
      if (origPlat) {
        const tc = origPlat.getTopCenter();
        player.x = tc.x;
        player.y = tc.y;
        player.onPlatform = state.platformIndex - 1;
      }
    }
  }

  arenaNet.send({ type: 'land', success, targetIndex: jumpAnim.arenaTargetIdx + 1 });
  jumpAnim = null;
  player.rotation = 0;
}

// === 竞技模式：道具使用 ===

function arenaUseItem(itemType) {
  if (!arenaIsMyTurn || charging || jumpAnim) return;
  const state = arenaPlayerStates.get(arenaLocalPlayerId);
  if (!state || !state.items.includes(itemType)) return;

  if (itemType === 'pushback' || itemType === 'freeze') {
    arenaShowTargetSelect(itemType);
  } else {
    arenaNet.send({ type: 'use_item', itemType });
  }
}

function arenaShowTargetSelect(itemType) {
  const opponents = arenaRoomState.players.filter(p => p.id !== arenaLocalPlayerId);
  let html = '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;" id="arenaTargetPanel">';
  html += '<div style="color:#fff;font-size:18px;margin-bottom:10px;">选择目标</div>';
  for (const p of opponents) {
    html += `<button onclick="arenaSelectTarget('${itemType}','${p.id}')" style="padding:8px 20px;font-size:15px;border:none;border-radius:6px;background:${p.color};color:#fff;cursor:pointer;margin:4px;">${p.name}</button>`;
  }
  html += `<button onclick="document.getElementById('arenaTargetPanel').remove()" style="padding:6px 16px;font-size:13px;border:none;border-radius:6px;background:#555;color:#fff;cursor:pointer;margin-top:10px;">取消</button>`;
  html += '</div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function arenaSelectTarget(itemType, targetId) {
  const panel = document.getElementById('arenaTargetPanel');
  if (panel) panel.remove();
  arenaNet.send({ type: 'use_item', itemType, targetId });
}

// === 竞技模式：HUD 渲染 ===

function arenaRenderHUD() {
  if (!arenaMode || !arenaRoomState) return;

  // 赛道进度条
  const barY = 10, barH = 16, barX = 50, barW = W - 100;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barW, barH);
  const cellW = barW / 20;
  for (let i = 0; i < 20; i++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.strokeRect(barX + i * cellW, barY, cellW, barH);
    // Mystery 标记
    if (arenaRacetrack[i] && arenaRacetrack[i].isMystery) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('?', barX + i * cellW + cellW / 2, barY + barH - 3);
    }
  }
  // 玩家位置标记
  for (const [pid, state] of arenaPlayerStates) {
    const color = arenaGetPlayerColor(pid);
    const px = barX + (state.platformIndex - 1) * cellW + cellW / 2;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px, barY + barH / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 当前回合信息
  ctx.fillStyle = arenaGetPlayerColor(arenaCurrentTurnId);
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(arenaGetPlayerName(arenaCurrentTurnId) + ' 的回合', barX, barY + barH + 16);

  // 骰子与跳跃次数
  ctx.fillStyle = '#fff';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'right';
  if (arenaDiceAnimating) {
    ctx.fillText('🎲 ' + arenaDiceAnimValue + ' ...', W - 10, barY + barH + 16);
  } else {
    ctx.fillText('🎲 ' + arenaDiceValue + ' | 剩余跳跃：' + arenaJumpQuota, W - 10, barY + barH + 16);
  }

  // 投掷骰子按钮
  if (arenaWaitingForDiceClick && arenaIsMyTurn && !arenaDiceAnimating) {
    const btnW = 120, btnH = 36;
    const btnX = W / 2 - btnW / 2, btnY = H / 2 + 30;
    ctx.fillStyle = 'rgba(233,69,96,0.9)';
    ctx.beginPath();
    ctx.roundRect(btnX, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎲 投掷骰子', W / 2, btnY + 24);
    arenaRollBtnRect = { x: btnX, y: btnY, w: btnW, h: btnH };
  } else {
    arenaRollBtnRect = null;
  }

  // 骰子滚动动画
  if (arenaDiceAnimating) {
    const diceSize = 60;
    const dx = W / 2 - diceSize / 2;
    const dy = H / 2 - diceSize / 2 - 20;
    const bounce = Math.abs(Math.sin(Date.now() / 80)) * 10;
    const rot = (Date.now() / 50) % (Math.PI * 2);
    ctx.save();
    ctx.translate(W / 2, H / 2 - 20 - bounce);
    ctx.rotate(rot);
    // 骰子背景
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(-diceSize / 2, -diceSize / 2, diceSize, diceSize, 8);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-diceSize / 2, -diceSize / 2, diceSize, diceSize, 8);
    ctx.stroke();
    // 骰子点数
    ctx.fillStyle = '#333';
    arenaDrawDiceDots(0, 0, diceSize, arenaDiceAnimValue);
    ctx.restore();
  }

  // 骰子结果展示（掷完后短暂显示）
  if (arenaDiceShowResult > 0) {
    const diceSize = 60;
    const alpha = Math.min(1, arenaDiceShowResult / 30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W / 2, H / 2 - 20);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(-diceSize / 2, -diceSize / 2, diceSize, diceSize, 8);
    ctx.fill();
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(-diceSize / 2, -diceSize / 2, diceSize, diceSize, 8);
    ctx.stroke();
    ctx.fillStyle = '#e94560';
    arenaDrawDiceDots(0, 0, diceSize, arenaDiceValue);
    ctx.restore();
    ctx.globalAlpha = 1;
    arenaDiceShowResult--;
  }

  // 回合计数
  ctx.fillStyle = '#aaa';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('第 ' + arenaRoundNumber + ' 回合', 10, barY + barH + 35);

  // 本地玩家平台进度
  const myState = arenaPlayerStates.get(arenaLocalPlayerId);
  if (myState) {
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(myState.platformIndex + ' / 20', 10, barY + barH + 52);
  }

  // 道具栏
  const localState = arenaPlayerStates.get(arenaLocalPlayerId);
  if (localState) {
    const itemY = H - 50;
    for (let i = 0; i < 2; i++) {
      const ix = W - 90 + i * 42;
      if (localState.items[i]) {
        ctx.fillStyle = 'rgba(255,215,0,0.3)';

      } else {

        ctx.setLineDash([4, 4]);
        ctx.strokeRect(ix, itemY, 38, 38);
        ctx.setLineDash([]);
      }
    }
  }

  // 弹出提示
  for (let i = arenaEventPopups.length - 1; i >= 0; i--) {
    const pop = arenaEventPopups[i];
    pop.alpha -= 0.008;
    pop.y -= 0.5;
    if (pop.alpha <= 0) { arenaEventPopups.splice(i, 1); continue; }
    ctx.globalAlpha = pop.alpha;
    ctx.fillStyle = pop.color;
    ctx.font = 'bold 20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(pop.text, W / 2, pop.y);
    ctx.globalAlpha = 1;
  }

  // 玩家状态卡片
  const cardY = barY + barH + 25;
  let cardX = barX;
  for (const [pid, state] of arenaPlayerStates) {
    const color = arenaGetPlayerColor(pid);
    const name = arenaGetPlayerName(pid);
    ctx.fillStyle = pid === arenaCurrentTurnId ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(cardX, cardY, 80, 28);
    ctx.fillStyle = color;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(name, cardX + 3, cardY + 12);
    ctx.fillStyle = '#aaa';
    ctx.fillText('第' + state.platformIndex + '格', cardX + 3, cardY + 24);
    if (state.skipTurns > 0) {
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('🔒' + state.skipTurns, cardX + 55, cardY + 12);
    }
    cardX += 85;
  }

  // 退出按钮（右上角）
  const exitBtnX = W - 60, exitBtnY = barY + barH + 25;
  ctx.fillStyle = 'rgba(85,85,85,0.7)';
  ctx.beginPath();
  ctx.roundRect(exitBtnX, exitBtnY, 50, 24, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('退出', exitBtnX + 25, exitBtnY + 16);
  arenaExitBtnRect = { x: exitBtnX, y: exitBtnY, w: 50, h: 24 };
}

// 绘制骰子点数
function arenaDrawDiceDots(cx, cy, size, value) {
  const r = size * 0.07;
  const off = size * 0.25;
  const dots = {
    1: [[0, 0]],
    2: [[-off, -off], [off, off]],
    3: [[-off, -off], [0, 0], [off, off]],
    4: [[-off, -off], [off, -off], [-off, off], [off, off]],
    5: [[-off, -off], [off, -off], [0, 0], [-off, off], [off, off]],
    6: [[-off, -off], [off, -off], [-off, 0], [off, 0], [-off, off], [off, off]]
  };
  const positions = dots[value] || dots[1];
  for (const [dx, dy] of positions) {
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === 竞技模式：Ghost 渲染 ===

function arenaRenderGhosts(ox, oy) {
  // 绘制其他玩家角色（50%透明度）
  for (const [pid, state] of arenaPlayerStates) {
    if (pid === arenaLocalPlayerId) continue;
    // 跳过正在跳跃动画中的玩家（由ghost动画绘制）
    const isJumping = arenaGhosts.some(g => g.playerId === pid);
    if (isJumping) continue;
    const platIdx = state.platformIndex - 1;
    if (platIdx < 0 || platIdx >= arenaRacetrack.length) continue;
    const tc = arenaRacetrack[platIdx].getTopCenter();
    const gx = tc.x - ox, gy = tc.y - oy;
    ctx.globalAlpha = 0.5;
    arenaDrawCharacter(gx, gy, arenaGetPlayerColor(pid), arenaGetPlayerSkinId(pid));
    // 状态效果
    arenaDrawStatusEffects(gx, gy, state);
    // 名字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(arenaGetPlayerName(pid), gx, gy - 48);
    ctx.globalAlpha = 1;
  }

  // 本地玩家状态效果
  if (player && arenaLocalPlayerId) {
    const localState = arenaPlayerStates.get(arenaLocalPlayerId);
    if (localState) {
      const px = player.x - ox, py = player.y - oy;
      arenaDrawStatusEffects(px, py, localState);
    }
  }

  // Ghost 跳跃动画（完整角色形态）
  for (let i = arenaGhosts.length - 1; i >= 0; i--) {
    const g = arenaGhosts[i];
    g.progress += 16 / g.duration;
    if (g.progress >= 1) {
      arenaGhosts.splice(i, 1);
      continue;
    }
    const t = g.progress;
    const gx = g.startX + (g.targetX - g.startX) * t - ox;
    const gy = calculateParabola(t, g.startY, g.targetY, g.height) - oy;
    // 跳跃旋转
    const rotation = t * Math.PI * 2 * (g.targetX > g.startX ? 1 : -1);
    ctx.globalAlpha = 0.5;
    ctx.save();
    ctx.translate(gx, gy - 20);
    ctx.rotate(rotation);
    ctx.translate(-gx, -(gy - 20));
    arenaDrawCharacter(gx, gy, g.color, g.skinId || 'default');
    ctx.restore();
    // 名字
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(g.name, gx, gy - 48);
    ctx.globalAlpha = 1;
  }
}

// 绘制角色（与Player.draw一致的风格）
function arenaDrawCharacter(px, py, color, skinId) {
  const skin = getSkinById(skinId || 'default');
  const w = 20, h = 40;

  if (skin.type === 'advanced') {
    drawAdvancedChar(ctx, px, py, skin, w, h, 0);
    return;
  }

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(px, py + 2, w * 0.6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // 轮廓
  if (skin.outlineColor) {
    ctx.fillStyle = skin.outlineColor;
    ctx.beginPath();
    ctx.roundRect(px - w / 2 - 1.5, py - h - 1.5, w + 3, h + 3, [w / 2 + 1, w / 2 + 1, 5, 5]);
    ctx.fill();
  }
  // 身体
  const bodyColor = skin.bodyColor || color;
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(px - w / 2, py - h, w, h, [w / 2, w / 2, 4, 4]);
  ctx.fill();
  // 内圈
  ctx.fillStyle = skin.innerColor;
  ctx.beginPath();
  ctx.roundRect(px - w / 2 + 3, py - h + 3, w - 6, h - 6, [w / 2 - 3, w / 2 - 3, 2, 2]);
  ctx.fill();
  // 眼睛
  ctx.fillStyle = skin.eyeColor;
  const eyeY = py - h + h * 0.35;
  ctx.beginPath();
  ctx.arc(px - 4, eyeY, skin.eyeSize, 0, Math.PI * 2);
  ctx.arc(px + 4, eyeY, skin.eyeSize, 0, Math.PI * 2);
  ctx.fill();
  // 高光
  ctx.fillStyle = skin.highlightColor;
  ctx.beginPath();
  ctx.arc(px - 3, eyeY - 1, 1, 0, Math.PI * 2);
  ctx.arc(px + 5, eyeY - 1, 1, 0, Math.PI * 2);
  ctx.fill();
  // 特效
  if (skin.effect) {
    drawSkinEffect(ctx, px, py - h, w, h, skin.effect, bodyColor);
  }
}

// 绘制玩家状态效果（监狱、护盾、冻结等）
function arenaDrawStatusEffects(px, py, state) {
  // 监狱效果：铁栏杆
  if (state.skipTurns > 0) {
    ctx.strokeStyle = 'rgba(150,150,150,0.7)';
    ctx.lineWidth = 2;
    for (let b = -8; b <= 8; b += 8) {
      ctx.beginPath();
      ctx.moveTo(px + b, py - 48);
      ctx.lineTo(px + b, py + 2);
      ctx.stroke();
    }
    // 横杆
    ctx.beginPath();
    ctx.moveTo(px - 12, py - 30);
    ctx.lineTo(px + 12, py - 30);
    ctx.moveTo(px - 12, py - 15);
    ctx.lineTo(px + 12, py - 15);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  // 护盾效果：金色光环
  if (state.hasShield) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
    ctx.strokeStyle = `rgba(255,215,0,${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(px, py - 20, 16, 24, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  // 必中卡效果：脚下金色光环
  if (state.autoLandRemaining > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
    ctx.fillStyle = `rgba(255,215,0,${pulse * 0.4})`;
    ctx.beginPath();
    ctx.ellipse(px, py, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === 竞技模式：Mystery_Platform 视觉 ===

function arenaRenderMysteryMarks(ox, oy, maxVisibleIdx) {
  for (let i = 0; i < arenaRacetrack.length; i++) {
    if (i > maxVisibleIdx) break;
    const plat = arenaRacetrack[i];
    if (!plat.isMystery || plat.collapsed) continue;
    const tc = plat.getTopCenter();
    const mx = tc.x - ox, my = tc.y - oy;
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 750 * Math.PI);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('?', mx, my + 6);
    ctx.globalAlpha = 1;
  }
}

// === 竞技模式：游戏循环 ===

function arenaGameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  arenaUpdate(dt);
  arenaRender();

  if (arenaMode || jumpAnim) {
    requestAnimationFrame(arenaGameLoop);
  }
}

function arenaUpdate(dt) {
  updateBgDecorations(dt);
  for (const p of arenaRacetrack) p.update(dt);

  if (charging && player && arenaIsMyTurn) {
    chargePower = calculatePower(Date.now() - chargeStart, maxCharge);
    player.squash = chargePower;
    powerFill.style.width = (chargePower * 100) + '%';
  }

  if (jumpAnim) {
    jumpAnim.progress += dt / jumpAnim.duration;
    if (jumpAnim.power >= 0.25) {
      player.rotation = jumpAnim.progress * Math.PI * 2 * jumpAnim.dirSign;
    }
    if (jumpAnim.progress >= 1) {
      jumpAnim.progress = 1;
      player.x = jumpAnim.targetX;
      player.y = jumpAnim.targetY;
      player.rotation = 0;
      arenaHandleLanding();
    } else {
      const t = jumpAnim.progress;
      player.x = jumpAnim.startX + (jumpAnim.targetX - jumpAnim.startX) * t;
      player.y = calculateParabola(t, jumpAnim.startY, jumpAnim.targetY, jumpAnim.height);
    }
  }

  // 跟随移动平台（包括蓄力期间）
  if (!jumpAnim && player && arenaMode) {
    const curPlat = arenaRacetrack[player.onPlatform];
    if (curPlat && curPlat.moving && curPlat.moveDeltaX) {
      player.x += curPlat.moveDeltaX;
    }
  }

  if (player && player.bounce > 0) {
    player.bounce -= dt * 0.004;
    if (player.bounce < 0) player.bounce = 0;
  }

  updateParticles(dt);
  updateCamera(dt);
}

function arenaRender() {
  drawGameBg();
  const ox = cameraX + shakeX, oy = cameraY + shakeY;

  // 只渲染到最靠前玩家 +3 个平台（逐步出现）
  let maxVisibleIdx = 0;
  for (const [pid, state] of arenaPlayerStates) {
    if (state.platformIndex - 1 > maxVisibleIdx) maxVisibleIdx = state.platformIndex - 1;
  }
  maxVisibleIdx = Math.min(maxVisibleIdx + 3, arenaRacetrack.length - 1);

  const visible = arenaRacetrack.filter((p, i) => i <= maxVisibleIdx);
  const sorted = [...visible].sort((a, b) => a.y - b.y);
  for (const p of sorted) p.draw(ox, oy);

  arenaRenderMysteryMarks(ox, oy, maxVisibleIdx);
  arenaRenderGhosts(ox, oy);

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - ox, p.y - oy, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  if (player) player.draw(ox, oy);

  arenaRenderHUD();
}

// === 竞技模式：输入绑定 ===

const origStartCharge = startCharge;
const origReleaseCharge = releaseCharge;

startCharge = function() {
  if (arenaMode) { arenaStartCharge(); return; }
  origStartCharge();
};

releaseCharge = function() {
  if (arenaMode) { arenaReleaseCharge(); return; }
  origReleaseCharge();
};

// === 竞技模式：道具栏点击 ===

canvas.addEventListener('click', (e) => {
  if (!arenaMode) return;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

  // 退出按钮
  if (arenaExitBtnRect) {
    const b = arenaExitBtnRect;
    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) {
      if (confirm('确定退出游戏？')) {
        if (arenaNet) arenaNet.disconnect();
        arenaMode = false;
        gameRunning = false;
        showOverlay(false);
      }
      return;
    }
  }
});

</script>
